title = "DevSecOps Pipeline Sample Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "custom-dotnet-hardcoded-secret"
description = "Detects simple hardcoded secret assignments in .NET-style config or code"
regex = '''(?i)(password|pwd|token|secret|api[_-]?key)\s*[:=]\s*['"][A-Za-z0-9@#$%^&+=._-]{6,}['"]'''
keywords = [
	"password",
	"pwd",
	"token",
	"secret",
	"apiKey",
	"api-key"
]

[[allowlists]]
description = "Ignore generated build, test, and scan outputs"
paths = [
	'''(^|/)(artifacts|TestResults)(/|$)''',
	'''(^|/)(bin|obj)(/|$)''',
	'''(^|/)act-.*\.log$''',
	'''(^|/)coverage[^/]*\.(xml|json|info)$'''
]