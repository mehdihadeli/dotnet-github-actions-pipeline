name: Publish container image
description: Build container image and optionally push to registry.

inputs:
  registry:
    description: OCI registry host.
    required: false
    default: ghcr.io
  image-name:
    description: Repository-relative image name.
    required: true
  image-tag:
    description: Image tag.
    required: true
  dockerfile-path:
    description: Path to Dockerfile.
    required: false
    default: Dockerfile
  context:
    description: Docker build context.
    required: false
    default: .
  push:
    description: Whether to push image to registry.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
  # Enables Docker Buildx for modern multi-platform builds.
  - name: Setup Docker Buildx
    uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

  # Builds the container image and optionally pushes it to a registry.
  - name: Build and optionally push image
    uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
    with:
      context: ${{ inputs.context }}
      file: ${{ inputs.dockerfile-path }}
      push: ${{ inputs.push }}
      tags: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
