name: Publish container image
description: Build container image and optionally push to registry.

inputs:
  registry:
    description: OCI registry host.
    required: false
    default: ghcr.io
  image-name:
    description: Repository-relative image name.
    required: true
  image-tag:
    description: Image tag.
    required: true
  dockerfile-path:
    description: Path to Dockerfile.
    required: false
    default: Dockerfile
  context:
    description: Docker build context.
    required: false
    default: .
  push:
    description: Whether to push image to registry.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
  - name: Setup Docker Buildx
    uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

  - name: Build and optionally push image
    uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
    with:
      context: ${{ inputs.context }}
      file: ${{ inputs.dockerfile-path }}
      push: ${{ inputs.push }}
      tags: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
