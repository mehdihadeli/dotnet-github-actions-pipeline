name: Build solution
description: Build solution using the Husky-managed build task.

inputs:
  global-json-file:
    description: Path to global.json.
    required: false
    default: global.json
  solution-path:
    description: Path to solution or solution filter.
    required: false
    default: DevSecOpsPipelineSample.slnx

runs:
  using: composite
  steps:
  # Reuses shared .NET setup before the build task runs.
  - name: Setup
    uses: ./.github/actions/setup
    with:
      global-json-file: ${{ inputs.global-json-file }}
      solution-path: ${{ inputs.solution-path }}

  - name: Build
    shell: bash
    env:
      SOLUTION_PATH: ${{ inputs.solution-path }}
      BUILD_CONFIGURATION: Release
    run: dotnet tool run husky -- run --name build-ci
