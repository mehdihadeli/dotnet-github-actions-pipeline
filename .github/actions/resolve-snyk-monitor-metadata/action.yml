name: Resolve Snyk monitor metadata
description: Build target-reference and project-tags for Snyk monitor commands.

inputs:
  kind:
    description: Snyk project kind tag such as app, image, or iac.
    required: true
  image-tag:
    description: Optional image tag used for image monitor metadata.
    required: false
    default: ""
  use-image-tag-for-tag-ref:
    description: Whether tag builds should use the image tag instead of the git tag.
    required: false
    default: "false"

outputs:
  target_reference:
    description: Resolved Snyk target reference.
    value: ${{ steps.resolve.outputs.target_reference }}
  project_tags:
    description: Resolved Snyk project tags.
    value: ${{ steps.resolve.outputs.project_tags }}

runs:
  using: composite
  steps:
  - name: Resolve monitor metadata
    id: resolve
    shell: bash
    env:
      KIND: ${{ inputs.kind }}
      IMAGE_TAG: ${{ inputs.image-tag }}
      USE_IMAGE_TAG_FOR_TAG_REF: ${{ inputs.use-image-tag-for-tag-ref }}
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      GITHUB_REF_TYPE: ${{ github.ref_type }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    run: |
      short_sha="${GITHUB_SHA::7}"
      ref_slug="$(printf '%s' "$GITHUB_REF_NAME" | tr '/:@' '---')"
      image_tag_slug="$(printf '%s' "$IMAGE_TAG" | tr '/:@' '---')"

      if [[ "$GITHUB_REF_TYPE" == 'tag' ]]; then
        if [[ "$USE_IMAGE_TAG_FOR_TAG_REF" == 'true' && -n "$image_tag_slug" ]]; then
          target_reference="$image_tag_slug"
        else
          target_reference="$ref_slug"
        fi
      else
        target_reference="$short_sha"
      fi

      project_tags="repo=${GITHUB_REPOSITORY#*/},event=${GITHUB_EVENT_NAME},ref=${ref_slug},commit=${short_sha},kind=${KIND}"

      if [[ -n "$image_tag_slug" ]]; then
        project_tags="${project_tags},image_tag=${image_tag_slug}"
      fi

      echo "target_reference=$target_reference" >> "$GITHUB_OUTPUT"
      echo "project_tags=$project_tags" >> "$GITHUB_OUTPUT"
