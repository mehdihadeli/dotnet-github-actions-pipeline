name: Resolve Snyk IaC config
description: Decide whether a Snyk IaC scan should run based on token availability and supported tracked files.

outputs:
  enabled:
    description: Whether the Snyk IaC scan should run.
    value: ${{ steps.resolve.outputs.enabled }}

runs:
  using: composite
  steps:
  - name: Resolve Snyk IaC enablement
    id: resolve
    shell: bash
    env:
      SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
    run: |
      if [[ -z "${SNYK_TOKEN}" ]]; then
        echo "enabled=false" >> "$GITHUB_OUTPUT"
        echo "SNYK_TOKEN not configured. Skip Snyk IaC scan."
        exit 0
      fi

      has_supported_snyk_iac_file=false

      while IFS= read -r file; do
        case "$file" in
          *.tf|*.tf.json|Chart.yaml|charts/*|helm/*|k8s/*|kubernetes/*|manifests/*)
            has_supported_snyk_iac_file=true
            break
            ;;
        esac
      done < <(git ls-files)

      if [[ "$has_supported_snyk_iac_file" != 'true' ]]; then
        echo "enabled=false" >> "$GITHUB_OUTPUT"
        echo "No Snyk-supported IaC files found in tracked repository contents. Skip Snyk IaC scan."
        exit 0
      fi

      echo "enabled=true" >> "$GITHUB_OUTPUT"
