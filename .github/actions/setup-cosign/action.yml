name: Setup Cosign
description: Install a pinned Cosign release for signing and verification steps.

inputs:
  cosign-release:
    description: Cosign release version.
    required: false
    default: v3.0.6

runs:
  using: composite
  steps:
  - name: Install Cosign
    uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
    with:
      cosign-release: ${{ inputs.cosign-release }}
