name: Test solution
description: Run tests using the Husky-managed test task.

inputs:
  global-json-file:
    description: Path to global.json.
    required: false
    default: global.json
  solution-path:
    description: Path to solution or solution filter.
    required: false
    default: DevSecOpsPipelineSample.slnx
  results-directory:
    description: Directory for test results.
    required: false
    default: TestResults

runs:
  using: composite
  steps:
  - name: Setup
    uses: ./.github/actions/setup
    with:
      global-json-file: ${{ inputs.global-json-file }}
      solution-path: ${{ inputs.solution-path }}

  - name: Build for tests
    shell: bash
    run: dotnet tool run husky -- run --name build

  - name: Run tests
    shell: bash
    run: dotnet tool run husky -- run --name test
