name: Setup .NET sample
description: Setup SDK, restore local tools, and restore solution dependencies.

inputs:
  global-json-file:
    description: Path to global.json.
    required: false
    default: global.json
  solution-path:
    description: Path to solution or solution filter.
    required: false
    default: DevSecOpsPipelineSample.slnx

runs:
  using: composite
  steps:
  # Installs the .NET SDK version declared by global.json.
  - name: Setup .NET SDK
    uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
    with:
      global-json-file: ${{ inputs.global-json-file }}

  - name: Restore local tools
    shell: bash
    run: dotnet tool restore

  - name: Restore solution
    shell: bash
    env:
      SOLUTION_PATH: ${{ inputs.solution-path }}
    run: dotnet tool run husky -- run --name setup-solution-restore
