name: Checkout code
description: Checkout repository content with a configurable fetch depth.

inputs:
  fetch-depth:
    description: Git fetch depth.
    required: false
    default: "1"
  repository:
    description: Repository to checkout. Defaults to the current repository.
    required: false
    default: ""
  ref:
    description: Branch, tag, or SHA to checkout.
    required: false
    default: ""
  token:
    description: Token used to fetch the repository.
    required: false
    default: ""
  path:
    description: Relative path under GITHUB_WORKSPACE to place the repository.
    required: false
    default: ""

runs:
  using: composite
  steps:
  - name: Checkout repository
    uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    with:
      fetch-depth: ${{ inputs.fetch-depth }}
      repository: ${{ inputs.repository }}
      ref: ${{ inputs.ref }}
      token: ${{ inputs.token }}
      path: ${{ inputs.path }}
