name: Checkout code
description: Checkout repository content with a configurable fetch depth.

inputs:
  fetch-depth:
    description: Git fetch depth.
    required: false
    default: "1"

runs:
  using: composite
  steps:
  - name: Checkout repository
    uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    with:
      fetch-depth: ${{ inputs.fetch-depth }}
