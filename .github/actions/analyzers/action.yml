name: Run analyzers
description: Execute analyzers with code-style enforcement.

inputs:
  global-json-file:
    description: Path to global.json.
    required: false
    default: global.json
  solution-path:
    description: Path to solution or solution filter.
    required: false
    default: DevSecOpsPipelineSample.slnx

runs:
  using: composite
  steps:
  - name: Setup
    uses: ./.github/actions/setup
    with:
      global-json-file: ${{ inputs.global-json-file }}
      solution-path: ${{ inputs.solution-path }}

  - name: Run Roslyn analyzers
    shell: bash
    env:
      SOLUTION_PATH: ${{ inputs.solution-path }}
    run: dotnet build "$SOLUTION_PATH" -c Release --no-restore /p:RunAnalyzers=true /p:EnforceCodeStyleInBuild=true
