name: Run analyzers
description: Execute Husky-managed analyzer checks.

inputs:
  global-json-file:
    description: Path to global.json.
    required: false
    default: global.json
  solution-path:
    description: Path to solution or solution filter.
    required: false
    default: DevSecOpsPipelineSample.slnx

runs:
  using: composite
  steps:
  # Reuses shared .NET setup before analyzer checks run.
  - name: Setup
    uses: ./.github/actions/setup
    with:
      global-json-file: ${{ inputs.global-json-file }}
      solution-path: ${{ inputs.solution-path }}

  - name: Run Roslyn analyzers
    shell: bash
    run: dotnet tool run husky -- run --name analyzers
