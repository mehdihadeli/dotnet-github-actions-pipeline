name: Validate formatting
description: Run dotnet format in verify mode.

inputs:
  global-json-file:
    description: Path to global.json.
    required: false
    default: global.json
  solution-path:
    description: Path to solution or solution filter.
    required: false
    default: DevSecOpsPipelineSample.slnx

runs:
  using: composite
  steps:
  - name: Setup
    uses: ./.github/actions/setup
    with:
      global-json-file: ${{ inputs.global-json-file }}
      solution-path: ${{ inputs.solution-path }}

  - name: Verify formatting
    shell: bash
    env:
      SOLUTION_PATH: ${{ inputs.solution-path }}
    run: dotnet format "$SOLUTION_PATH" --verify-no-changes --severity error
