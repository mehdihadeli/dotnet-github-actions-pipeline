name: CI

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/**
      - Dockerfile
      - global.json
      - Directory.Build.props
      - DevSecOpsPipelineSample.slnx
      - dotnet-tools.json
      - "!**.md"
  pull_request:
    paths:
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/**
      - Dockerfile
      - global.json
      - Directory.Build.props
      - DevSecOpsPipelineSample.slnx
      - dotnet-tools.json
  workflow_dispatch:
    inputs:
      sonar_enabled:
        description: Whether to run Sonar analysis.
        type: boolean
        required: true
        default: true
      publish_image:
        description: Whether to publish container image.
        type: boolean
        required: true
        default: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  HUSKY: 0
  APP_SBOM_PROJECT_NAME: devsecops-pipeline-sample
  REGISTRY: ghcr.io
  IMAGE_TAR_PATH: image.tar.gz
  TRIVY_FAIL_SEVERITY: CRITICAL,HIGH

jobs:
  # =============================================================================
  # STAGE 1: QUALITY GATES
  # Fast feedback before security-heavy stages.
  # Pipeline tools: dotnet format/style/analyzers, Gitleaks, Hadolint.
  # Local tools: dotnet format, dotnet build, gitleaks detect, hadolint Dockerfile.
  # =============================================================================
  quality-check:
    name: "Stage 1: Quality Gates"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate formatting
        uses: ./.github/actions/format

      - name: Validate style
        uses: ./.github/actions/style

      - name: Run analyzers
        uses: ./.github/actions/analyzers

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

      - name: Lint Dockerfile
        shell: bash
        run: docker run --rm -i hadolint/hadolint < Dockerfile

  # =============================================================================
  # STAGE 2: SAST AND PIPELINE MISCONFIGURATION SCANNING
  # SAST (Static Application Security Testing) starts here: scan source, config, and code paths without running app.
  # Pipeline SAST tools: Semgrep for code patterns, CodeQL for deep code-flow analysis,
  # Sonar for secure-code and quality rules, Checkov for GitHub Actions/Docker/IaC policy checks.
  # =============================================================================
  sast-semgrep:
    name: "Stage 2: SAST - Semgrep"
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare Semgrep artifacts
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/security

      - name: Run Semgrep SAST
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
            --config p/security-audit \
            --error \
            --metrics=off \
            --exclude .git \
            --exclude artifacts \
            --exclude tests \
            --sarif \
            --output artifacts/security/semgrep.sarif \
            .

      - name: Upload Semgrep SARIF
        if: always()
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: artifacts/security/semgrep.sarif
          category: semgrep

  sast-iac-checkov:
    name: "Stage 2: IaC & Pipeline Scan"
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare Checkov artifacts
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/security

      - name: Resolve Snyk IaC configuration
        id: snyk_iac_config
        uses: ./.github/actions/resolve-snyk-iac-config
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Snyk GitHub Actions docs:
      # - Overview: https://docs.snyk.io/developer-tools/integrations/snyk-ci-cd-integrations/github-actions-for-snyk-setup-and-checking-for-vulnerabilities
      # - IaC action: https://docs.snyk.io/developer-tools/integrations/snyk-ci-cd-integrations/github-actions-for-snyk-setup-and-checking-for-vulnerabilities/snyk-infrastructure-as-code-action
      # - Setup action: https://docs.snyk.io/developer-tools/integrations/snyk-ci-cd-integrations/github-actions-for-snyk-setup-and-checking-for-vulnerabilities/snyk-setup-action

      - name: Run Checkov IaC scan
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@1f0ef821c5e4e9c5c9ae9550701402d75c9608b5 # v12.3076.0
        with:
          directory: .
          framework: github_actions,dockerfile,secrets
          quiet: true
          output_format: cli,sarif
          output_file_path: console,artifacts/security/checkov.sarif

      - name: Upload Checkov SARIF
        if: always()
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: artifacts/security/checkov.sarif
          category: checkov

      - name: Run Snyk IaC scan
        if: steps.snyk_iac_config.outputs.enabled == 'true'
        id: snyk_iac_scan
        continue-on-error: true
        uses: snyk/actions/iac@8e119fbb6c251787721d34ba683ed48eba792766
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            .
            --severity-threshold=high

      - name: Upload Snyk IaC SARIF
        if: always() && steps.snyk_iac_config.outputs.enabled == 'true'
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: snyk.sarif
          category: snyk-iac

      - name: Resolve Snyk IaC monitor metadata
        if: steps.snyk_iac_config.outputs.enabled == 'true'
        id: snyk_iac_meta
        uses: ./.github/actions/resolve-snyk-monitor-metadata
        with:
          kind: iac

      - name: Monitor IaC in Snyk
        if: always() && steps.snyk_iac_config.outputs.enabled == 'true'
        uses: snyk/actions/iac@8e119fbb6c251787721d34ba683ed48eba792766
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            .
            --report
            --target-name=${{ env.APP_SBOM_PROJECT_NAME }}-iac
            --target-reference=${{ steps.snyk_iac_meta.outputs.target_reference }}
            --project-tags=${{ steps.snyk_iac_meta.outputs.project_tags }}

      - name: Fail on IaC findings
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.snyk_iac_scan.outcome }}" == 'failure' ]]; then
            echo "::error::Snyk IaC scan found high or critical misconfigurations."
            exit 1
          fi

          if [[ "${{ steps.checkov.outcome }}" == 'failure' ]]; then
            echo "::error::Checkov found IaC or pipeline misconfigurations."
            exit 1
          fi

          exit 0

  sast-codeql:
    name: "Stage 2: SAST - CodeQL"
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: manual
          queries: security-and-quality

      - name: Build solution for CodeQL
        uses: ./.github/actions/build

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:csharp

  # Sonar runs its own build, test, and coverage import flow here so analysis gets test and coverage data,
  # while the later build-test stage remains a separate CI verification and artifact publishing gate.
  sast-sonar:
    name: "Stage 2: SAST - Sonar"
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Restore local tools
        shell: bash
        run: dotnet tool restore

      - name: Configure Husky
        shell: bash
        run: dotnet husky install

      - name: Restore solution
        shell: bash
        run: dotnet restore DevSecOpsPipelineSample.slnx

      - name: Setup SonarQube Scanner
        uses: ./.github/actions/sonar-scanner-setup

      - name: Resolve Sonar configuration
        id: sonar_config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_CI_ENABLED: ${{ github.event_name == 'workflow_dispatch' && (inputs.sonar_enabled && 'true' || 'false') || vars.SONAR_CI_ENABLED || 'true' }}
        run: |
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Sonar not configured. Skip Sonar analysis."
            exit 0
          fi

          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"
          sonar_ci_enabled="$(printf '%s' "${SONAR_CI_ENABLED:-true}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${sonar_ci_enabled}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Sonar analysis because Sonar CI is disabled for this run."
            exit 0
          fi

          if [[ -z "${SONAR_PROJECT_KEY}" ]]; then
            echo "::error::SONAR_PROJECT_KEY is required when SONAR_TOKEN is configured."
            exit 1
          fi

          if [[ "${host_url}" == "https://sonarcloud.io" && -z "${SONAR_ORGANIZATION}" ]]; then
            echo "::error::SONAR_ORGANIZATION is required for SonarCloud analysis."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "host_url=${host_url}" >> "$GITHUB_OUTPUT"

      - name: Sonarqube Begin
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_HOST_URL: ${{ steps.sonar_config.outputs.host_url }}
        run: |
          args=(
            "/k:${SONAR_PROJECT_KEY}"
            "/d:sonar.host.url=${SONAR_HOST_URL}"
            "/d:sonar.token=${SONAR_TOKEN}"
            "/d:sonar.qualitygate.wait=true"
            "/d:sonar.scm.provider=git"
            "/d:sonar.cs.vstest.reportsPaths=TestResults/Sonar/**/*.trx"
            "/d:sonar.cs.vscoveragexml.reportsPaths=TestResults/Sonar/**/coverage.xml"
          )

          if [[ -n "${SONAR_ORGANIZATION}" ]]; then
            args+=("/o:${SONAR_ORGANIZATION}")
          fi

          ./.sonar/scanner/dotnet-sonarscanner begin "${args[@]}"

      - name: Build
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        run: dotnet build DevSecOpsPipelineSample.slnx --configuration Release --no-restore

      - name: Test
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          TEST_SOLUTION_PATH: DevSecOpsPipelineSample.slnx
          TEST_CONFIGURATION: Release
          TEST_RESULTS_DIRECTORY: TestResults/Sonar
          TEST_COVERAGE_OUTPUT_FORMAT: xml
          TEST_COVERAGE_OUTPUT: coverage.xml
          TEST_ADDITIONAL_COVERAGE_OUTPUT_FORMAT: ""
          TEST_ADDITIONAL_COVERAGE_OUTPUT: ""
          TEST_NO_BUILD: "true"
        run: dotnet tool run husky -- run --name test

      - name: Sonarqube End
        if: always() && steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  # =============================================================================
  # STAGE 3: BUILD AND TEST VALIDATION
  # Confirm the app still compiles and both unit and end-to-end suites pass after SAST.
  # The shared test action runs two solution-level passes filtered by xUnit v3 traits.
  # Pipeline tools: dotnet build/test, ReportGenerator coverage reports, Coveralls upload.
  # Local tools: dotnet build, dotnet test, coverage collection for fast regression checks.
  # =============================================================================
  dotnet-build-test:
    name: "Stage 3: Build & Test Validation"
    runs-on: ubuntu-latest
    needs:
      - quality-check
      - sast-iac-checkov
      - sast-semgrep
      - sast-codeql
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Build solution
        uses: ./.github/actions/build

      - name: Test solution
        uses: ./.github/actions/test
        with:
          test-filter-queries: |
            /[TestSuite=Unit]
            /[TestSuite=EndToEnd]
          no-build: true
          skip-setup: true
          generate-coverage-report: true
          publish-coverage-summary: true
          upload-coverage-artifact: true
          upload-test-artifact: true
          upload-coveralls: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # STAGE 4: APPLICATION SCA, SBOM, AND ARTIFACT SECURITY
  # SCA (Software Composition Analysis) starts here: inspect third-party packages, base components, licenses, and known CVEs.
  # Pipeline SCA tools: Trivy, Grype, Snyk, CycloneDX SBOM, Cosign signing, Dependency-Track ingestion.
  # =============================================================================
  dotnet-app-sca-security:
    name: "Stage 4: App SCA & SBOM Security"
    runs-on: ubuntu-latest
    needs:
      - dotnet-build-test
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build version metadata
        id: version_meta
        uses: ./.github/actions/resolve-version-metadata

      - name: Setup .NET and restore
        uses: ./.github/actions/setup

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/setup-cosign

      - name: Prepare app security directories
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/publish
            artifacts/sbom/app
            artifacts/security

      - name: Publish app for scan surface
        shell: bash
        run: >-
          dotnet publish src/DevSecOpsPipelineSample.Api/DevSecOpsPipelineSample.Api.csproj
          -c Release
          -o artifacts/publish
          --no-restore

      - name: Generate app SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: artifacts/publish
          format: cyclonedx-json
          output-file: artifacts/sbom/app/bom.json
          artifact-name: app-sbom.json
          upload-artifact: false

      - name: Sign app SBOM
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/sign-keyless-blob
        with:
          blob-path: artifacts/sbom/app/bom.json
          bundle-path: artifacts/sbom/app/bom.sigstore.json

      - name: Verify app SBOM signature
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/verify-keyless-blob-signature
        with:
          blob-path: artifacts/sbom/app/bom.json
          bundle-path: artifacts/sbom/app/bom.sigstore.json

      - name: Run Trivy app scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.github,artifacts,tests
          format: sarif
          output: artifacts/security/trivy-app.sarif
          exit-code: "0"

      - name: Run Trivy app scan JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.github,artifacts,tests
          format: json
          output: artifacts/security/trivy-app.json
          severity: ${{ env.TRIVY_FAIL_SEVERITY }}
          exit-code: "1"
          skip-setup-trivy: true

      - name: Upload Trivy app SARIF
        if: always() && hashFiles('artifacts/security/trivy-app.sarif') != ''
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: artifacts/security/trivy-app.sarif
          category: trivy-app

      - name: Run Grype app scan SARIF
        if: always()
        id: grype_app_sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: artifacts/publish
          fail-build: false
          output-format: sarif
          output-file: artifacts/security/grype-app.sarif

      - name: Run Grype app scan JSON
        if: always()
        id: grype_app_json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: artifacts/publish
          fail-build: false
          output-format: json
          output-file: artifacts/security/grype-app.json

      - name: Upload Grype app SARIF
        if: always()
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: artifacts/security/grype-app.sarif
          category: grype-app

      - name: Resolve Snyk app configuration
        id: snyk_app_config
        uses: ./.github/actions/resolve-snyk-config
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          scan-name: app

      # Snyk GitHub Actions docs:
      # - Overview: https://docs.snyk.io/developer-tools/integrations/snyk-ci-cd-integrations/github-actions-for-snyk-setup-and-checking-for-vulnerabilities
      # - Setup action: https://docs.snyk.io/developer-tools/integrations/snyk-ci-cd-integrations/github-actions-for-snyk-setup-and-checking-for-vulnerabilities/snyk-setup-action

      - name: Setup Snyk CLI
        if: steps.snyk_app_config.outputs.enabled == 'true'
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Run Snyk app scan
        if: steps.snyk_app_config.outputs.enabled == 'true'
        id: snyk_app_scan
        continue-on-error: true
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >-
          snyk test
          --file=src/DevSecOpsPipelineSample.Api/obj/project.assets.json
          --package-manager=nuget
          --severity-threshold=high
          --sarif-file-output=artifacts/security/snyk-app.sarif

      - name: Upload Snyk app SARIF
        if: always() && steps.snyk_app_config.outputs.enabled == 'true' && hashFiles('artifacts/security/snyk-app.sarif') != ''
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: artifacts/security/snyk-app.sarif
          category: snyk-app

      - name: Resolve Snyk app monitor metadata
        if: steps.snyk_app_config.outputs.enabled == 'true'
        id: snyk_app_meta
        uses: ./.github/actions/resolve-snyk-monitor-metadata
        with:
          kind: app

      - name: Monitor app in Snyk
        if: always() && steps.snyk_app_config.outputs.enabled == 'true'
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >-
          snyk monitor
          --file=src/DevSecOpsPipelineSample.Api/obj/project.assets.json
          --package-manager=nuget
          --project-name=${{ env.APP_SBOM_PROJECT_NAME }}-app
          --target-reference=${{ steps.snyk_app_meta.outputs.target_reference }}
          --project-tags=${{ steps.snyk_app_meta.outputs.project_tags }}
          --remote-repo-url=https://github.com/${{ github.repository }}

      - name: Fail on Snyk app findings
        if: always() && steps.snyk_app_config.outputs.enabled == 'true' && steps.snyk_app_scan.outcome == 'failure'
        uses: ./.github/actions/fail-on-snyk-findings
        with:
          status: "1"
          message: Snyk app scan found high or critical vulnerabilities.

      - name: Upload app SBOM to Dependency-Track
        if: always()
        uses: ./.github/actions/upload-dependency-track-bom
        with:
          dependency-track-url: ${{ secrets.DEPENDENCY_TRACK_URL }}
          dependency-track-api-key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          bom-file: artifacts/sbom/app/bom.json
          project-name: ${{ env.APP_SBOM_PROJECT_NAME }}
          project-version: ${{ steps.version_meta.outputs.build_version }}

      - name: Upload app security artifacts
        if: always()
        uses: ./.github/actions/upload-workflow-artifact
        with:
          name: app-security-artifacts
          path: |
            artifacts/sbom/app/**
            artifacts/security/snyk-app.sarif
            artifacts/security/trivy-app.*
            artifacts/security/grype-app.*

  # =============================================================================
  # STAGE 5: CONTAINER BUILD PREPARATION
  # Build immutable image artifact once, then reuse same artifact for later image security stages.
  # Local tools: docker build, docker save, docker load.
  # =============================================================================
  image-build:
    name: "Stage 5: Build Image Artifact"
    runs-on: ubuntu-latest
    needs:
      - dotnet-app-sca-security
    outputs:
      image-name: ${{ steps.meta.outputs.image_name }}
      image-ref: ${{ steps.meta.outputs.image_ref }}
      image-tag: ${{ steps.meta.outputs.image_tag }}
      build-version: ${{ steps.meta.outputs.build_version }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve image and version metadata
        id: meta
        uses: ./.github/actions/resolve-version-metadata

      - name: Build container image
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
        run: docker build -t "$IMAGE_REF" .

      - name: Save container image artifact
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
        run: docker save "$IMAGE_REF" | gzip > "$IMAGE_TAR_PATH"

      - name: Upload container image artifact
        uses: ./.github/actions/upload-workflow-artifact
        with:
          name: container-image
          path: ${{ env.IMAGE_TAR_PATH }}

  # =============================================================================
  # STAGE 6: IMAGE SCA, SBOM, AND CONTAINER SECURITY
  # Re-run SCA against final image because base-image packages and runtime layers matter.
  # Pipeline image security tools: Trivy, Grype, Snyk Container, CycloneDX SBOM, Cosign signing, Dependency-Track.
  # Local image security tools: trivy image, grype, snyk container test, docker scout or equivalent, cosign verify.
  # =============================================================================
  image-sca-security:
    name: "Stage 6: Image SCA & SBOM Security"
    runs-on: ubuntu-latest
    needs:
      - image-build
    outputs:
      image-name: ${{ steps.image_meta.outputs.image_name }}
      image-ref: ${{ steps.image_meta.outputs.image_ref }}
      image-tag: ${{ steps.image_meta.outputs.image_tag }}
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download container image artifact
        uses: ./.github/actions/download-workflow-artifact
        with:
          name: container-image
          path: .

      - name: Load container image
        shell: bash
        run: docker load < "${IMAGE_TAR_PATH}"

      - name: Expose image metadata
        id: image_meta
        shell: bash
        env:
          IMAGE_NAME: ${{ needs.image-build.outputs.image-name }}
          IMAGE_REF: ${{ needs.image-build.outputs.image-ref }}
          IMAGE_TAG: ${{ needs.image-build.outputs.image-tag }}
        run: |
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/setup-cosign

      - name: Prepare image security directories
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/sbom/image
            artifacts/security

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          format: cyclonedx-json
          output-file: artifacts/sbom/image/image.cdx.json
          artifact-name: image-sbom.cdx.json
          upload-artifact: false

      - name: Sign image SBOM
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/sign-keyless-blob
        with:
          blob-path: artifacts/sbom/image/image.cdx.json
          bundle-path: artifacts/sbom/image/image-sbom.sigstore.json

      - name: Verify image SBOM signature
        if: github.event_name != 'pull_request'
        uses: ./.github/actions/verify-keyless-blob-signature
        with:
          blob-path: artifacts/sbom/image/image.cdx.json
          bundle-path: artifacts/sbom/image/image-sbom.sigstore.json

      - name: Run Trivy image scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: artifacts/security/trivy-image.sarif
          exit-code: "0"

      - name: Run Trivy image scan JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln,secret,misconfig
          format: json
          output: artifacts/security/trivy-image.json
          severity: ${{ env.TRIVY_FAIL_SEVERITY }}
          exit-code: "1"
          skip-setup-trivy: true

      - name: Upload Trivy image SARIF
        if: always()
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: artifacts/security/trivy-image.sarif
          category: trivy-image

      - name: Run Grype image scan SARIF
        if: always()
        id: grype_image_sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          fail-build: false
          output-format: sarif
          output-file: artifacts/security/grype-image.sarif

      - name: Run Grype image scan JSON
        if: always()
        id: grype_image_json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          fail-build: false
          output-format: json
          output-file: artifacts/security/grype-image.json

      - name: Upload Grype image SARIF
        if: always()
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: artifacts/security/grype-image.sarif
          category: grype-image

      - name: Resolve Snyk image configuration
        id: snyk_image_config
        uses: ./.github/actions/resolve-snyk-config
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          scan-name: image

      # Snyk GitHub Actions docs:
      # - Overview: https://docs.snyk.io/developer-tools/integrations/snyk-ci-cd-integrations/github-actions-for-snyk-setup-and-checking-for-vulnerabilities
      # - Docker action: https://docs.snyk.io/developer-tools/integrations/snyk-ci-cd-integrations/github-actions-for-snyk-setup-and-checking-for-vulnerabilities/snyk-docker-action
      # - Setup action: https://docs.snyk.io/developer-tools/integrations/snyk-ci-cd-integrations/github-actions-for-snyk-setup-and-checking-for-vulnerabilities/snyk-setup-action

      - name: Run Snyk image scan
        if: steps.snyk_image_config.outputs.enabled == 'true'
        id: snyk_image_scan
        continue-on-error: true
        uses: snyk/actions/docker@8e119fbb6c251787721d34ba683ed48eba792766
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          args: >-
            --file=Dockerfile
            --severity-threshold=high
            --sarif-file-output=artifacts/security/snyk-image.sarif

      - name: Upload Snyk image SARIF
        if: always() && steps.snyk_image_config.outputs.enabled == 'true' && hashFiles('artifacts/security/snyk-image.sarif') != ''
        uses: ./.github/actions/upload-sarif
        with:
          sarif-file: artifacts/security/snyk-image.sarif
          category: snyk-image

      - name: Resolve Snyk image monitor metadata
        if: steps.snyk_image_config.outputs.enabled == 'true'
        id: snyk_image_meta
        uses: ./.github/actions/resolve-snyk-monitor-metadata
        with:
          kind: image
          image-tag: ${{ needs.image-build.outputs.image-tag }}
          use-image-tag-for-tag-ref: "true"

      - name: Monitor image in Snyk
        if: always() && steps.snyk_image_config.outputs.enabled == 'true'
        uses: snyk/actions/docker@8e119fbb6c251787721d34ba683ed48eba792766
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          image: ${{ needs.image-build.outputs.image-ref }}
          args: >-
            --file=Dockerfile
            --project-name=${{ env.APP_SBOM_PROJECT_NAME }}-image
            --target-reference=${{ steps.snyk_image_meta.outputs.target_reference }}
            --project-tags=${{ steps.snyk_image_meta.outputs.project_tags }}

      - name: Fail on Snyk image findings
        if: always() && steps.snyk_image_config.outputs.enabled == 'true' && steps.snyk_image_scan.outcome == 'failure'
        uses: ./.github/actions/fail-on-snyk-findings
        with:
          status: "1"
          message: Snyk image scan found high or critical vulnerabilities.

      - name: Upload image SBOM to Dependency-Track
        if: always()
        uses: ./.github/actions/upload-dependency-track-bom
        with:
          dependency-track-url: ${{ secrets.DEPENDENCY_TRACK_URL }}
          dependency-track-api-key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          bom-file: artifacts/sbom/image/image.cdx.json
          project-name: ${{ env.APP_SBOM_PROJECT_NAME }}-image
          project-version: ${{ needs.image-build.outputs.build-version }}

      - name: Upload image security artifacts
        if: always()
        uses: ./.github/actions/upload-workflow-artifact
        with:
          name: image-security-artifacts
          path: |
            artifacts/sbom/image/**
            artifacts/security/snyk-image.sarif
            artifacts/security/trivy-image.*
            artifacts/security/grype-image.*

  # =============================================================================
  # STAGE 7: SECURITY GATE ENFORCEMENT
  # Central pass/fail control point. Deployment and publishing continue only when
  # Sonar, app security, and image security all succeed.
  # =============================================================================
  security-gate:
    name: "Stage 7: Security Gate"
    if: always()
    runs-on: ubuntu-latest
    needs:
      - sast-sonar
      - dotnet-app-sca-security
      - image-sca-security
    outputs:
      gate-status: ${{ steps.evaluate.outputs.gate_status }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Evaluate security gate
        id: evaluate
        shell: bash
        env:
          SONAR_RESULT: ${{ needs.sast-sonar.result }}
          APP_RESULT: ${{ needs.dotnet-app-sca-security.result }}
          IMAGE_RESULT: ${{ needs.image-sca-security.result }}
        run: |
          mkdir -p reports

          if [[ "${SONAR_RESULT}" == "success" && "${APP_RESULT}" == "success" && "${IMAGE_RESULT}" == "success" ]]; then
            GATE_STATUS="PASS"
            GATE_MESSAGE="Sonar, application security, and image security stages passed."
          else
            GATE_STATUS="FAIL"
            GATE_MESSAGE="One or more Sonar or security stages failed."
          fi

          cat > reports/security-gate-report.md <<EOF
          # Security Gate Report

          - Gate status: ${GATE_STATUS}
          - Sonar result: ${SONAR_RESULT}
          - App security result: ${APP_RESULT}
          - Image security result: ${IMAGE_RESULT}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          ${GATE_MESSAGE}
          EOF

          echo "gate_status=${GATE_STATUS}" >> "$GITHUB_OUTPUT"

          {
            echo "## Security Gate"
            echo ""
            echo "- Gate status: ${GATE_STATUS}"
            echo "- Sonar: ${SONAR_RESULT}"
            echo "- App security: ${APP_RESULT}"
            echo "- Image security: ${IMAGE_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${GATE_STATUS}" != "PASS" ]]; then
            echo "::error::Security gate failed."
            exit 1
          fi

      - name: Upload security gate report
        if: always()
        uses: ./.github/actions/upload-workflow-artifact
        with:
          name: security-gate-report
          path: reports/security-gate-report.md

  # =============================================================================
  # STAGE 8: PUBLISH, SIGN, VERIFY, AND ATTEST
  # Supply-chain hardening for release image.
  # Pipeline tools: Docker Buildx, GHCR, Cosign, GitHub Attestations.
  # Local tools: docker buildx, cosign sign/verify, gh attestation verify when validating release outputs.
  # =============================================================================
  image-publish:
    name: "Stage 8: Publish Image"
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - security-gate
      - image-sca-security
    outputs:
      image-ref: ${{ needs.image-sca-security.outputs.image-ref }}
      image-digest: ${{ steps.build_and_push.outputs.digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: ./.github/actions/login-ghcr
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ env.REGISTRY }}/${{ needs.image-sca-security.outputs.image-name }}
          tags: |
            type=raw,value=${{ needs.image-sca-security.outputs.image-tag }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build_and_push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}

      - name: Summarize published image
        uses: ./.github/actions/summarize-published-image
        with:
          image-ref: ${{ needs.image-sca-security.outputs.image-ref }}
          image-digest: ${{ steps.build_and_push.outputs.digest }}

  image-sign:
    name: "Stage 8: Sign Image"
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-publish
    runs-on: ubuntu-latest
    outputs:
      image-repository: ${{ steps.sign.outputs.image_repository }}
      image-digest: ${{ steps.sign.outputs.image_digest }}
      image-with-digest: ${{ steps.sign.outputs.image_with_digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Download image security artifacts
        uses: ./.github/actions/download-workflow-artifact
        with:
          name: image-security-artifacts
          path: ghcr-evidence/image-security

      - name: Login to GHCR
        uses: ./.github/actions/login-ghcr
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: ./.github/actions/setup-cosign

      - name: Sign published image with GitHub OIDC
        id: sign
        uses: ./.github/actions/sign-published-image
        with:
          image-publish-ref: ${{ needs.image-publish.outputs.image-ref }}
          image-publish-digest: ${{ needs.image-publish.outputs.image-digest }}
          image-security-artifacts-path: ghcr-evidence/image-security

  verify-image-signature:
    name: "Stage 8: Verify Image Signature"
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-sign
    outputs:
      image-with-digest: ${{ steps.verified_image.outputs.image_with_digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: ./.github/actions/login-ghcr
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: ./.github/actions/setup-cosign

      - name: Verify keyless image signature
        id: verified_image
        uses: ./.github/actions/verify-keyless-image-signature
        with:
          workflow-ref: ${{ github.workflow_ref }}
          image-with-digest: ${{ needs.image-sign.outputs.image-with-digest }}

  attest:
    name: "Stage 8: Attest Image"
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-sign
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Attest published image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ needs.image-sign.outputs.image-repository }}
          subject-digest: ${{ needs.image-sign.outputs.image-digest }}

  # =============================================================================
  # STAGE 9: EVIDENCE, REPORTING, AND PR FEEDBACK
  # Persist artifacts needed for audit, incident response, and deployment handoff.
  # =============================================================================
  record-and-notify:
    name: "Stage 9: Record & Notify"
    if: always()
    runs-on: ubuntu-latest
    needs:
      - sast-sonar
      - dotnet-build-test
      - dotnet-app-sca-security
      - image-sca-security
      - security-gate
      - image-publish
      - image-sign
      - verify-image-signature
      - attest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download CI evidence artifacts
        if: always()
        uses: ./.github/actions/download-ci-evidence-artifacts
        with:
          test-results-result: ${{ needs.dotnet-build-test.result }}
          app-security-result: ${{ needs.dotnet-app-sca-security.result }}
          image-security-result: ${{ needs.image-sca-security.result }}
          security-gate-result: ${{ needs.security-gate.result }}

      - name: Resolve shared version metadata
        id: version_meta
        uses: ./.github/actions/resolve-version-metadata

      - name: Create CI evidence summary
        uses: ./.github/actions/create-ci-evidence
        with:
          build-version: ${{ needs.image-sca-security.outputs.image-tag || steps.version_meta.outputs.build_version }}
          security-gate-status: ${{ needs.security-gate.outputs.gate-status || 'SKIPPED' }}
          sonar-result: ${{ needs.sast-sonar.result }}
          build-and-test-result: ${{ needs.dotnet-build-test.result }}
          app-security-result: ${{ needs.dotnet-app-sca-security.result }}
          image-security-result: ${{ needs.image-sca-security.result }}
          image-publish-result: ${{ needs.image-publish.result }}
          image-sign-result: ${{ needs.image-sign.result }}
          verify-image-signature-result: ${{ needs.verify-image-signature.result }}
          attest-result: ${{ needs.attest.result }}
          published-image-ref: ${{ needs.image-publish.outputs.image-ref }}
          published-image-digest: ${{ needs.image-publish.outputs.image-digest }}
          signed-image-with-digest: ${{ needs.image-sign.outputs.image-with-digest }}
          verified-image-with-digest: ${{ needs.verify-image-signature.outputs.image-with-digest }}

      - name: Upload CI evidence bundle
        if: always()
        uses: ./.github/actions/upload-workflow-artifact
        with:
          name: ci-evidence
          path: ci-evidence/**

      - name: Comment on pull request
        if: always() && github.event_name == 'pull_request' && hashFiles('ci-evidence/pipeline-summary.md') != ''
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          SUMMARY_FILE="ci-evidence/pipeline-summary.md"

          if [[ ! -f "$SUMMARY_FILE" ]]; then
            echo "::warning::Skipping PR comment because summary file was not generated."
            exit 0
          fi

          if ! gh api \
            "repos/$REPOSITORY/issues/$PULL_REQUEST_NUMBER/comments" \
            -f body="$(cat "$SUMMARY_FILE")"; then
            echo "::warning::Failed to post PR comment (likely token permission scope for this event)."
          fi
