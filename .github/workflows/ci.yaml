name: CI

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/**
      - Dockerfile
      - global.json
      - Directory.Build.props
      - DevSecOpsPipelineSample.slnx
      - dotnet-tools.json
      - "!**.md"
  pull_request:
    paths:
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/**
      - Dockerfile
      - global.json
      - Directory.Build.props
      - DevSecOpsPipelineSample.slnx
      - dotnet-tools.json
  workflow_dispatch:
    inputs:
      sonar_enabled:
        description: Whether to run Sonar analysis.
        type: boolean
        required: true
        default: true
      publish_image:
        description: Whether to publish container image.
        type: boolean
        required: true
        default: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  HUSKY: 0
  APP_SBOM_PROJECT_NAME: devsecops-pipeline-sample
  REGISTRY: ghcr.io
  IMAGE_TAR_PATH: image.tar.gz
  TRIVY_FAIL_SEVERITY: CRITICAL,HIGH

jobs:
  # =============================================================================
  # STAGE 1: QUALITY GATES
  # Fast feedback before security-heavy stages.
  # Pipeline tools: dotnet format/style/analyzers, Gitleaks, Hadolint.
  # Local tools: dotnet format, dotnet build, gitleaks detect, hadolint Dockerfile.
  # =============================================================================
  quality-check:
    name: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate formatting
        uses: ./.github/actions/format

      - name: Validate style
        uses: ./.github/actions/style

      - name: Run analyzers
        uses: ./.github/actions/analyzers

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

      - name: Lint Dockerfile
        shell: bash
        run: docker run --rm -i hadolint/hadolint < Dockerfile

  # =============================================================================
  # STAGE 2: SAST AND PIPELINE MISCONFIGURATION SCANNING
  # SAST (Static Application Security Testing) starts here: scan source, config, and code paths without running app.
  # Pipeline SAST tools: Semgrep for code patterns, CodeQL for deep code-flow analysis,
  # Sonar for secure-code and quality rules, Checkov for GitHub Actions/Docker/IaC policy checks.
  # =============================================================================
  sast-semgrep:
    name: sast-semgrep
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Prepare Semgrep artifacts
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/security

      - name: Run Semgrep SAST
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
            --config p/security-audit \
            --error \
            --metrics=off \
            --exclude .git \
            --exclude artifacts \
            --exclude tests \
            --sarif \
            --output artifacts/security/semgrep.sarif \
            .

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/semgrep.sarif
          category: semgrep

  sast-iac-checkov:
    name: sast-iac-checkov
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Prepare Checkov artifacts
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/security

      - name: Run Checkov IaC scan
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@1f0ef821c5e4e9c5c9ae9550701402d75c9608b5 # v12.3076.0
        with:
          directory: .
          framework: github_actions,dockerfile,secrets
          quiet: true
          output_format: cli,sarif
          output_file_path: console,artifacts/security/checkov.sarif

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/checkov.sarif
          category: checkov

      - name: Fail on Checkov findings
        if: steps.checkov.outcome == 'failure'
        shell: bash
        run: |
          echo "::error::Checkov found IaC or pipeline misconfigurations."
          exit 1

  sast-codeql:
    name: sast-codeql
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: manual
          queries: security-and-quality

      - name: Build solution for CodeQL
        uses: ./.github/actions/build

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:csharp

  # Sonar runs its own build, test, and coverage import flow here so analysis gets test and coverage data,
  # while the later build-test stage remains a separate CI verification and artifact publishing gate.
  sast-sonar:
    name: sast-sonar
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET Core
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Cache NuGet Packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Build.props', 'Directory.Build.targets', 'global.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore local tools
        shell: bash
        run: dotnet tool restore

      - name: Configure Husky
        shell: bash
        run: dotnet husky install

      - name: Restore solution
        shell: bash
        run: dotnet restore DevSecOpsPipelineSample.slnx

      - name: Setup SonarQube Scanner
        uses: ./.github/actions/sonar-scanner-setup

      - name: Resolve Sonar configuration
        id: sonar_config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_CI_ENABLED: ${{ github.event_name == 'workflow_dispatch' && (inputs.sonar_enabled && 'true' || 'false') || vars.SONAR_CI_ENABLED || 'true' }}
        run: |
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Sonar not configured. Skip Sonar analysis."
            exit 0
          fi

          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"
          sonar_ci_enabled="$(printf '%s' "${SONAR_CI_ENABLED:-true}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${sonar_ci_enabled}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Sonar analysis because Sonar CI is disabled for this run."
            exit 0
          fi

          if [[ -z "${SONAR_PROJECT_KEY}" ]]; then
            echo "::error::SONAR_PROJECT_KEY is required when SONAR_TOKEN is configured."
            exit 1
          fi

          if [[ "${host_url}" == "https://sonarcloud.io" && -z "${SONAR_ORGANIZATION}" ]]; then
            echo "::error::SONAR_ORGANIZATION is required for SonarCloud analysis."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "host_url=${host_url}" >> "$GITHUB_OUTPUT"

      - name: Sonarqube Begin
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_HOST_URL: ${{ steps.sonar_config.outputs.host_url }}
        run: |
          args=(
            "/k:${SONAR_PROJECT_KEY}"
            "/d:sonar.host.url=${SONAR_HOST_URL}"
            "/d:sonar.token=${SONAR_TOKEN}"
            "/d:sonar.qualitygate.wait=true"
            "/d:sonar.scm.provider=git"
            "/d:sonar.cs.vstest.reportsPaths=TestResults/Sonar/**/*.trx"
            "/d:sonar.cs.vscoveragexml.reportsPaths=TestResults/Sonar/**/coverage.xml"
          )

          if [[ -n "${SONAR_ORGANIZATION}" ]]; then
            args+=("/o:${SONAR_ORGANIZATION}")
          fi

          ./.sonar/scanner/dotnet-sonarscanner begin "${args[@]}"

      - name: Build
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        run: dotnet build DevSecOpsPipelineSample.slnx --configuration Release --no-restore

      - name: Test
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          TEST_SOLUTION_PATH: DevSecOpsPipelineSample.slnx
          TEST_CONFIGURATION: Release
          TEST_RESULTS_DIRECTORY: TestResults/Sonar
          TEST_COVERAGE_OUTPUT_FORMAT: xml
          TEST_COVERAGE_OUTPUT: coverage.xml
          TEST_ADDITIONAL_COVERAGE_OUTPUT_FORMAT: ""
          TEST_ADDITIONAL_COVERAGE_OUTPUT: ""
          TEST_NO_BUILD: "true"
        run: dotnet tool run husky -- run --name test

      - name: Sonarqube End
        if: always() && steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  # =============================================================================
  # STAGE 3: BUILD AND TEST VALIDATION
  # Confirm app still compiles and tests pass after the fast blocking quality and SAST checks.
  # Sonar runs in parallel and is enforced later by the final security gate so test feedback arrives sooner.
  # Pipeline tools: dotnet build/test, ReportGenerator coverage reports, Coveralls upload.
  # Local tools: dotnet build, dotnet test, coverage collection for fast regression checks.
  # =============================================================================
  dotnet-build-test:
    name: dotnet-build-test
    runs-on: ubuntu-latest
    needs:
      - quality-check
      - sast-iac-checkov
      - sast-semgrep
      - sast-codeql
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Build solution
        uses: ./.github/actions/build

      - name: Test solution
        uses: ./.github/actions/test
        with:
          no-build: true
          skip-setup: true
          generate-coverage-report: true
          publish-coverage-summary: true
          upload-coverage-artifact: true
          upload-test-artifact: true
          upload-coveralls: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # STAGE 4: SCA, SBOM, AND APPLICATION ARTIFACT SECURITY
  # SCA (Software Composition Analysis) starts here: inspect third-party packages, base components, licenses, and known CVEs.
  # Pipeline SCA tools: Trivy, Grype, Snyk, CycloneDX SBOM, Cosign signing, Dependency-Track ingestion.
  # =============================================================================
  dotnet-app-sca-security:
    name: dotnet-app-sca-security
    runs-on: ubuntu-latest
    needs:
      - dotnet-build-test
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup .NET and restore
        uses: ./.github/actions/setup

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Prepare app security directories
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/publish
            artifacts/sbom/app
            artifacts/security

      - name: Publish app for scan surface
        shell: bash
        run: >-
          dotnet publish src/DevSecOpsPipelineSample.Api/DevSecOpsPipelineSample.Api.csproj
          -c Release
          -o artifacts/publish
          --no-restore

      - name: Generate app SBOM
        shell: bash
        run: >-
          dotnet tool run dotnet-CycloneDX DevSecOpsPipelineSample.slnx
          -o artifacts/sbom/app
          -j

      - name: Sign app SBOM
        if: github.event_name != 'pull_request'
        shell: bash
        run: >-
          cosign sign-blob --yes
          --bundle artifacts/sbom/app/bom.sigstore.json
          artifacts/sbom/app/bom.json

      - name: Verify app SBOM signature
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: >-
          cosign verify-blob
          --bundle artifacts/sbom/app/bom.sigstore.json
          --certificate-identity-regexp '^https://github.com/.+$'
          --certificate-oidc-issuer https://token.actions.githubusercontent.com
          --certificate-github-workflow-repository "$GITHUB_REPOSITORY"
          --certificate-github-workflow-ref "$GITHUB_REF"
          --certificate-github-workflow-sha "$GITHUB_SHA"
          --certificate-github-workflow-trigger "$GITHUB_EVENT_NAME"
          artifacts/sbom/app/bom.json

      - name: Run Trivy app scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.github,artifacts,tests
          format: sarif
          output: artifacts/security/trivy-app.sarif
          exit-code: "0"

      - name: Run Trivy app scan JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.github,artifacts,tests
          format: json
          output: artifacts/security/trivy-app.json
          severity: ${{ env.TRIVY_FAIL_SEVERITY }}
          exit-code: "1"
          skip-setup-trivy: true

      - name: Upload Trivy app SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/trivy-app.sarif
          category: trivy-app

      - name: Run Grype app scan SARIF
        if: always()
        id: grype_app_sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: artifacts/publish
          fail-build: false
          output-format: sarif
          output-file: artifacts/security/grype-app.sarif

      - name: Run Grype app scan JSON
        if: always()
        id: grype_app_json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: artifacts/publish
          fail-build: false
          output-format: json
          output-file: artifacts/security/grype-app.json

      - name: Upload Grype app SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/grype-app.sarif
          category: grype-app

      - name: Run Snyk app scan
        id: snyk_app_scan
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [[ -z "${SNYK_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "status=0" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN not configured. Skip Snyk app scan."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          set +e
          snyk test \
            --file=src/DevSecOpsPipelineSample.Api/DevSecOpsPipelineSample.Api.csproj \
            --severity-threshold=high \
            --sarif-file-output=artifacts/security/snyk-app.sarif
          status=$?
          set -e
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Upload Snyk app SARIF
        if: always() && steps.snyk_app_scan.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/snyk-app.sarif
          category: snyk-app

      - name: Fail on Snyk app findings
        if: always() && steps.snyk_app_scan.outputs.enabled == 'true' && steps.snyk_app_scan.outputs.status != '0'
        uses: ./.github/actions/fail-on-snyk-findings
        with:
          status: ${{ steps.snyk_app_scan.outputs.status }}
          message: Snyk app scan found high or critical vulnerabilities.

      - name: Upload app SBOM to Dependency-Track
        if: always()
        uses: ./.github/actions/upload-dependency-track-bom
        with:
          dependency-track-url: ${{ secrets.DEPENDENCY_TRACK_URL }}
          dependency-track-api-key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          bom-file: artifacts/sbom/app/bom.json
          project-name: ${{ env.APP_SBOM_PROJECT_NAME }}
          project-version: ${{ github.sha }}

      - name: Upload app security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-security-artifacts
          path: |
            artifacts/sbom/app/**
            artifacts/security/snyk-app.sarif
            artifacts/security/trivy-app.*
            artifacts/security/grype-app.*

  # =============================================================================
  # STAGE 5: CONTAINER BUILD PREPARATION
  # Build immutable image artifact once, then reuse same artifact for later image security stages.
  # Local tools: docker build, docker save, docker load.
  # =============================================================================
  image-build:
    name: image-build
    runs-on: ubuntu-latest
    needs:
      - dotnet-app-sca-security
    outputs:
      image-name: ${{ steps.meta.outputs.image_name }}
      image-ref: ${{ steps.meta.outputs.image_ref }}
      image-tag: ${{ steps.meta.outputs.image_tag }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Normalize repository name
        id: meta
        shell: bash
        env:
          REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          IMAGE_NAME="$(echo "$REPOSITORY_NAME" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            IMAGE_TAG="$GITHUB_REF_NAME"
          else
            IMAGE_TAG="$SHORT_SHA"
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
        run: docker build -t "$IMAGE_REF" .

      - name: Save container image artifact
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
        run: docker save "$IMAGE_REF" | gzip > "$IMAGE_TAR_PATH"

      - name: Upload container image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-image
          path: ${{ env.IMAGE_TAR_PATH }}

  # =============================================================================
  # STAGE 6: IMAGE SCA, SBOM, AND CONTAINER SECURITY
  # Re-run SCA against final image because base-image packages and runtime layers matter.
  # Pipeline image security tools: Trivy, Grype, Snyk Container, CycloneDX SBOM, Cosign signing, Dependency-Track.
  # Local image security tools: trivy image, grype, snyk container test, docker scout or equivalent, cosign verify.
  # =============================================================================
  image-sca-security:
    name: image-sca-security
    runs-on: ubuntu-latest
    needs:
      - image-build
    outputs:
      image-name: ${{ steps.image_meta.outputs.image_name }}
      image-ref: ${{ steps.image_meta.outputs.image_ref }}
      image-tag: ${{ steps.image_meta.outputs.image_tag }}
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Download container image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: container-image

      - name: Load container image
        shell: bash
        run: docker load < "${IMAGE_TAR_PATH}"

      - name: Expose image metadata
        id: image_meta
        shell: bash
        env:
          IMAGE_NAME: ${{ needs.image-build.outputs.image-name }}
          IMAGE_REF: ${{ needs.image-build.outputs.image-ref }}
          IMAGE_TAG: ${{ needs.image-build.outputs.image-tag }}
        run: |
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Prepare image security directories
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/sbom/image
            artifacts/security

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          format: cyclonedx-json
          output-file: artifacts/sbom/image/image.cdx.json
          artifact-name: image-sbom.cdx.json
          upload-artifact: false

      - name: Sign image SBOM
        if: github.event_name != 'pull_request'
        shell: bash
        run: >-
          cosign sign-blob --yes
          --bundle artifacts/sbom/image/image-sbom.sigstore.json
          artifacts/sbom/image/image.cdx.json

      - name: Verify image SBOM signature
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: >-
          cosign verify-blob
          --bundle artifacts/sbom/image/image-sbom.sigstore.json
          --certificate-identity-regexp '^https://github.com/.+$'
          --certificate-oidc-issuer https://token.actions.githubusercontent.com
          --certificate-github-workflow-repository "$GITHUB_REPOSITORY"
          --certificate-github-workflow-ref "$GITHUB_REF"
          --certificate-github-workflow-sha "$GITHUB_SHA"
          --certificate-github-workflow-trigger "$GITHUB_EVENT_NAME"
          artifacts/sbom/image/image.cdx.json

      - name: Run Trivy image scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: artifacts/security/trivy-image.sarif
          exit-code: "0"

      - name: Run Trivy image scan JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln,secret,misconfig
          format: json
          output: artifacts/security/trivy-image.json
          severity: ${{ env.TRIVY_FAIL_SEVERITY }}
          exit-code: "1"
          skip-setup-trivy: true

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/trivy-image.sarif
          category: trivy-image

      - name: Run Grype image scan SARIF
        if: always()
        id: grype_image_sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          fail-build: false
          output-format: sarif
          output-file: artifacts/security/grype-image.sarif

      - name: Run Grype image scan JSON
        if: always()
        id: grype_image_json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          fail-build: false
          output-format: json
          output-file: artifacts/security/grype-image.json

      - name: Upload Grype image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/grype-image.sarif
          category: grype-image

      - name: Run Snyk image scan
        id: snyk_image_scan
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          IMAGE_REF: ${{ needs.image-build.outputs.image-ref }}
        run: |
          if [[ -z "${SNYK_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "status=0" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN not configured. Skip Snyk image scan."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          set +e
          snyk container test "$IMAGE_REF" \
            --severity-threshold=high \
            --sarif-file-output=artifacts/security/snyk-image.sarif
          status=$?
          set -e
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Upload Snyk image SARIF
        if: always() && steps.snyk_image_scan.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/snyk-image.sarif
          category: snyk-image

      - name: Fail on Snyk image findings
        if: always() && steps.snyk_image_scan.outputs.enabled == 'true' && steps.snyk_image_scan.outputs.status != '0'
        uses: ./.github/actions/fail-on-snyk-findings
        with:
          status: ${{ steps.snyk_image_scan.outputs.status }}
          message: Snyk image scan found high or critical vulnerabilities.

      - name: Upload image SBOM to Dependency-Track
        if: always()
        uses: ./.github/actions/upload-dependency-track-bom
        with:
          dependency-track-url: ${{ secrets.DEPENDENCY_TRACK_URL }}
          dependency-track-api-key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          bom-file: artifacts/sbom/image/image.cdx.json
          project-name: ${{ env.APP_SBOM_PROJECT_NAME }}-image
          project-version: ${{ github.sha }}

      - name: Upload image security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-security-artifacts
          path: |
            artifacts/sbom/image/**
            artifacts/security/snyk-image.sarif
            artifacts/security/trivy-image.*
            artifacts/security/grype-image.*

  # =============================================================================
  # STAGE 7: SECURITY GATE ENFORCEMENT
  # Central pass/fail control point. Deployment and publishing continue only when
  # Sonar, app security, and image security all succeed.
  # =============================================================================
  security-gate:
    name: security-gate
    if: always()
    runs-on: ubuntu-latest
    needs:
      - sast-sonar
      - dotnet-app-sca-security
      - image-sca-security
    outputs:
      gate-status: ${{ steps.evaluate.outputs.gate_status }}
    permissions:
      contents: read
    steps:
      - name: Evaluate security gate
        id: evaluate
        shell: bash
        env:
          SONAR_RESULT: ${{ needs.sast-sonar.result }}
          APP_RESULT: ${{ needs.dotnet-app-sca-security.result }}
          IMAGE_RESULT: ${{ needs.image-sca-security.result }}
        run: |
          mkdir -p reports

          if [[ "${SONAR_RESULT}" == "success" && "${APP_RESULT}" == "success" && "${IMAGE_RESULT}" == "success" ]]; then
            GATE_STATUS="PASS"
            GATE_MESSAGE="Sonar, application security, and image security stages passed."
          else
            GATE_STATUS="FAIL"
            GATE_MESSAGE="One or more Sonar or security stages failed."
          fi

          cat > reports/security-gate-report.md <<EOF
          # Security Gate Report

          - Gate status: ${GATE_STATUS}
          - Sonar result: ${SONAR_RESULT}
          - App security result: ${APP_RESULT}
          - Image security result: ${IMAGE_RESULT}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          ${GATE_MESSAGE}
          EOF

          echo "gate_status=${GATE_STATUS}" >> "$GITHUB_OUTPUT"

          {
            echo "## Security Gate"
            echo ""
            echo "- Gate status: ${GATE_STATUS}"
            echo "- Sonar: ${SONAR_RESULT}"
            echo "- App security: ${APP_RESULT}"
            echo "- Image security: ${IMAGE_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${GATE_STATUS}" != "PASS" ]]; then
            echo "::error::Security gate failed."
            exit 1
          fi

      - name: Upload security gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-gate-report
          path: reports/security-gate-report.md

  # =============================================================================
  # STAGE 8: PUBLISH, SIGN, VERIFY, AND ATTEST
  # Supply-chain hardening for release image.
  # Pipeline tools: Docker Buildx, GHCR, Cosign, GitHub Attestations.
  # Local tools: docker buildx, cosign sign/verify, gh attestation verify when validating release outputs.
  # =============================================================================
  image-publish:
    name: image-publish
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - security-gate
      - image-sca-security
    outputs:
      image-ref: ${{ needs.image-sca-security.outputs.image-ref }}
      image-digest: ${{ steps.build_and_push.outputs.digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ env.REGISTRY }}/${{ needs.image-sca-security.outputs.image-name }}
          tags: |
            type=raw,value=${{ needs.image-sca-security.outputs.image-tag }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build_and_push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}

      - name: Summarize published image
        shell: bash
        env:
          IMAGE_REF: ${{ needs.image-sca-security.outputs.image-ref }}
          IMAGE_DIGEST: ${{ steps.build_and_push.outputs.digest }}
        run: |
          echo "Published ${IMAGE_REF}"
          echo "Digest ${IMAGE_DIGEST}"
          {
            echo "## Published Image"
            echo ""
            echo "- Reference: ${IMAGE_REF}"
            echo "- Digest: ${IMAGE_DIGEST}"
          } >> "$GITHUB_STEP_SUMMARY"

  image-sign:
    name: image-sign
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-publish
    runs-on: ubuntu-latest
    outputs:
      image-repository: ${{ steps.sign.outputs.image_repository }}
      image-digest: ${{ steps.sign.outputs.image_digest }}
      image-with-digest: ${{ steps.sign.outputs.image_with_digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Download image security artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-security-artifacts
          path: ghcr-evidence/image-security

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Attach image SBOM to published image
        shell: bash
        env:
          IMAGE_PUBLISH_REF: ${{ needs.image-publish.outputs.image-ref }}
          IMAGE_PUBLISH_DIGEST: ${{ needs.image-publish.outputs.image-digest }}
        run: |
          IMAGE_REPOSITORY="$IMAGE_PUBLISH_REF"
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY%:*}"
          IMAGE_DIGEST="$IMAGE_PUBLISH_DIGEST"
          IMAGE_WITH_DIGEST="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          IMAGE_SBOM_FILE="$(find ghcr-evidence/image-security -type f \( -name 'image.cdx.json' -o -name '*.cdx.json' \) | head -n 1)"

          if [[ -z "${IMAGE_SBOM_FILE}" ]]; then
            echo "::error::Image SBOM file not found for GHCR attachment."
            exit 1
          fi

          cosign attach sbom --sbom "${IMAGE_SBOM_FILE}" "${IMAGE_WITH_DIGEST}"

      - name: Sign published image with GitHub OIDC
        id: sign
        shell: bash
        env:
          IMAGE_PUBLISH_REF: ${{ needs.image-publish.outputs.image-ref }}
          IMAGE_PUBLISH_DIGEST: ${{ needs.image-publish.outputs.image-digest }}
        run: |
          IMAGE_REPOSITORY="$IMAGE_PUBLISH_REF"
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY%:*}"
          IMAGE_DIGEST="$IMAGE_PUBLISH_DIGEST"
          IMAGE_WITH_DIGEST="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          cosign sign --yes "${IMAGE_WITH_DIGEST}"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image_with_digest=${IMAGE_WITH_DIGEST}" >> "$GITHUB_OUTPUT"

  verify-image-signature:
    name: verify-image-signature
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-sign
    outputs:
      image-with-digest: ${{ steps.verified_image.outputs.image_with_digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Verify keyless image signature
        id: verified_image
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          IMAGE_WITH_DIGEST: ${{ needs.image-sign.outputs.image-with-digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/$WORKFLOW_REF" \
            "$IMAGE_WITH_DIGEST"
          echo "image_with_digest=$IMAGE_WITH_DIGEST" >> "$GITHUB_OUTPUT"

  attest:
    name: attest
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-sign
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Attest published image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ needs.image-sign.outputs.image-repository }}
          subject-digest: ${{ needs.image-sign.outputs.image-digest }}

  # =============================================================================
  # STAGE 9: EVIDENCE, REPORTING, AND PR FEEDBACK
  # Persist artifacts needed for audit, incident response, and deployment handoff.
  # =============================================================================
  record-and-notify:
    name: record-and-notify
    if: always()
    runs-on: ubuntu-latest
    needs:
      - sast-sonar
      - dotnet-build-test
      - dotnet-app-sca-security
      - image-sca-security
      - security-gate
      - image-publish
      - image-sign
      - verify-image-signature
      - attest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download test results
        if: always() && needs.dotnet-build-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-results
          path: ci-evidence/test-results

      - name: Download coverage report artifact
        if: always() && needs.dotnet-build-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
          path: ci-evidence/coverage-report

      - name: Download app security artifacts
        if: always() && needs.dotnet-app-sca-security.result != 'skipped'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-security-artifacts
          path: ci-evidence/app-security

      - name: Download image security artifacts
        if: always() && needs.image-sca-security.result != 'skipped'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-security-artifacts
          path: ci-evidence/image-security

      - name: Download security gate report
        if: always() && needs.security-gate.result != 'skipped'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: security-gate-report
          path: ci-evidence/security-gate

      - name: Create CI evidence summary
        shell: bash
        env:
          SECURITY_GATE_STATUS: ${{ needs.security-gate.outputs.gate-status || 'SKIPPED' }}
          SONAR_RESULT: ${{ needs.sast-sonar.result }}
          BUILD_AND_TEST_RESULT: ${{ needs.dotnet-build-test.result }}
          APP_SECURITY_RESULT: ${{ needs.dotnet-app-sca-security.result }}
          IMAGE_SECURITY_RESULT: ${{ needs.image-sca-security.result }}
          IMAGE_PUBLISH_RESULT: ${{ needs.image-publish.result }}
          IMAGE_SIGN_RESULT: ${{ needs.image-sign.result }}
          VERIFY_IMAGE_SIGNATURE_RESULT: ${{ needs.verify-image-signature.result }}
          ATTEST_RESULT: ${{ needs.attest.result }}
          PUBLISHED_IMAGE_REF: ${{ needs.image-publish.outputs.image-ref }}
          PUBLISHED_IMAGE_DIGEST: ${{ needs.image-publish.outputs.image-digest }}
          SIGNED_IMAGE_WITH_DIGEST: ${{ needs.image-sign.outputs.image-with-digest }}
          VERIFIED_IMAGE_WITH_DIGEST: ${{ needs.verify-image-signature.outputs.image-with-digest }}
        run: |
          mkdir -p ci-evidence

          AUTO_DEPLOY="false"
          TARGET_ENVIRONMENT=""
          DEPLOY_SOURCE="none"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            AUTO_DEPLOY="true"
            TARGET_ENVIRONMENT="dev"
            DEPLOY_SOURCE="main"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            AUTO_DEPLOY="true"
            TARGET_ENVIRONMENT="prod"
            DEPLOY_SOURCE="tag"
          fi

          IMAGE_VERSION="${PUBLISHED_IMAGE_REF##*:}"
          if [[ -z "${PUBLISHED_IMAGE_REF}" || "${IMAGE_VERSION}" == "${PUBLISHED_IMAGE_REF}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              IMAGE_VERSION="${GITHUB_REF_NAME}"
            else
              IMAGE_VERSION="${GITHUB_SHA::7}"
            fi
          fi

          cat > ci-evidence/build-metadata.json <<EOF
          {
            "build": {
              "name": "DevSecOpsPipelineSample",
              "number": "${GITHUB_RUN_NUMBER}",
              "version": "${IMAGE_VERSION}",
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "vcs": {
                "revision": "${GITHUB_SHA}",
                "branch": "${GITHUB_REF_NAME}",
                "url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
              }
            },
            "security": {
              "gate": {
                "status": "${SECURITY_GATE_STATUS}"
              },
              "stages": {
                "sonar": "${SONAR_RESULT}",
                "appSecurity": "${APP_SECURITY_RESULT}",
                "imageSecurity": "${IMAGE_SECURITY_RESULT}",
                "signatureVerification": "${VERIFY_IMAGE_SIGNATURE_RESULT}",
                "attestation": "${ATTEST_RESULT}"
              }
            },
            "artifacts": {
              "publishedImageRef": "${PUBLISHED_IMAGE_REF}",
              "publishedImageDigest": "${PUBLISHED_IMAGE_DIGEST}",
              "signedImageWithDigest": "${SIGNED_IMAGE_WITH_DIGEST}",
              "verifiedImageWithDigest": "${VERIFIED_IMAGE_WITH_DIGEST}",
              "ciEvidenceArtifact": "ci-evidence"
            },
            "deployment": {
              "autoDeploy": ${AUTO_DEPLOY},
              "targetEnvironment": "${TARGET_ENVIRONMENT}",
              "source": "${DEPLOY_SOURCE}"
            }
          }
          EOF

          cat > ci-evidence/pipeline-summary.md <<EOF
          # CI Pipeline Summary

          - Security gate: ${SECURITY_GATE_STATUS}
          - Sonar: ${SONAR_RESULT}
          - Build and test: ${BUILD_AND_TEST_RESULT}
          - App security: ${APP_SECURITY_RESULT}
          - Image security: ${IMAGE_SECURITY_RESULT}
          - Image publish: ${IMAGE_PUBLISH_RESULT}
          - Image sign: ${IMAGE_SIGN_RESULT}
          - Signature verify: ${VERIFY_IMAGE_SIGNATURE_RESULT}
          - Attest: ${ATTEST_RESULT}
          - Published image ref: ${PUBLISHED_IMAGE_REF}
          - Published image digest: ${PUBLISHED_IMAGE_DIGEST}
          - Signed image digest ref: ${SIGNED_IMAGE_WITH_DIGEST}
          - Verified image digest ref: ${VERIFIED_IMAGE_WITH_DIGEST}
          - Auto deploy: ${AUTO_DEPLOY}
          - Target environment: ${TARGET_ENVIRONMENT}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          cat > ci-evidence/pipeline-summary.json <<EOF
          {
            "securityGate": "${SECURITY_GATE_STATUS}",
            "sonar": "${SONAR_RESULT}",
            "buildAndTest": "${BUILD_AND_TEST_RESULT}",
            "appSecurity": "${APP_SECURITY_RESULT}",
            "imageSecurity": "${IMAGE_SECURITY_RESULT}",
            "imagePublish": "${IMAGE_PUBLISH_RESULT}",
            "imageSign": "${IMAGE_SIGN_RESULT}",
            "verifyImageSignature": "${VERIFY_IMAGE_SIGNATURE_RESULT}",
            "attest": "${ATTEST_RESULT}",
            "publishedImageRef": "${PUBLISHED_IMAGE_REF}",
            "publishedImageDigest": "${PUBLISHED_IMAGE_DIGEST}",
            "signedImageWithDigest": "${SIGNED_IMAGE_WITH_DIGEST}",
            "verifiedImageWithDigest": "${VERIFIED_IMAGE_WITH_DIGEST}",
            "autoDeploy": ${AUTO_DEPLOY},
            "targetEnvironment": "${TARGET_ENVIRONMENT}",
            "commit": "${GITHUB_SHA}",
            "runUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF

          cat ci-evidence/pipeline-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI evidence bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-evidence
          path: ci-evidence/**

      - name: Comment on pull request
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api \
            "repos/$REPOSITORY/issues/$PULL_REQUEST_NUMBER/comments" \
            -f body="$(cat ci-evidence/pipeline-summary.md)"
