name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/ci-cd.yaml
      - Dockerfile
      - global.json
      - Directory.Build.props
      - DevSecOpsPipelineSample.slnx
      - dotnet-tools.json
      - "!**.md"
  pull_request:
    paths:
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/ci-cd.yaml
      - Dockerfile
      - global.json
      - Directory.Build.props
      - DevSecOpsPipelineSample.slnx
      - dotnet-tools.json
  workflow_dispatch:
    inputs:
      publish_image:
        description: Whether to publish container image.
        type: boolean
        required: true
        default: false
      deploy:
        description: Whether to deploy image to Azure Container Apps.
        type: boolean
        required: true
        default: false
      environment:
        description: GitHub environment name for deployment.
        type: environment
        required: false
      resource_group:
        description: Azure resource group with existing Container App.
        type: string
        required: false
      container_app_name:
        description: Existing Azure Container App name.
        type: string
        required: false
      staged_api_url:
        description: Optional public URL for staged API ZAP baseline scan.
        type: string
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  HUSKY: 0
  APP_SBOM_PROJECT_NAME: DevSecOpsPipelineSample
  IMAGE_TAR_PATH: image.tar.gz
  TRIVY_FAIL_SEVERITY: CRITICAL,HIGH

jobs:
  quality-check:
    name: Quality check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          fetch-depth: 0

      - name: Validate formatting
        uses: ./.github/actions/format

      - name: Validate style
        uses: ./.github/actions/style

      - name: Run analyzers
        uses: ./.github/actions/analyzers

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

      - name: Lint Dockerfile
        shell: bash
        run: docker run --rm -i hadolint/hadolint < Dockerfile

  sast-semgrep:
    name: SAST Semgrep
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Prepare Semgrep artifacts
        shell: bash
        run: mkdir -p artifacts/security

      - name: Run Semgrep SAST
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
            --config auto \
            --error \
            --verbose \
            --exclude .git \
            --exclude artifacts \
            --exclude tests \
            --sarif \
            --output artifacts/security/semgrep.sarif \
            .

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: artifacts/security/semgrep.sarif
          category: semgrep

  iac-checkov:
    name: IaC Checkov
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Prepare Checkov artifacts
        shell: bash
        run: mkdir -p artifacts/security

      - name: Run Checkov IaC scan
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@1f0ef821c5e4e9c5c9ae9550701402d75c9608b5 # v12.3076.0
        with:
          directory: .
          framework: github_actions,dockerfile,secrets
          quiet: true
          output_format: cli,sarif
          output_file_path: console,artifacts/security/checkov.sarif

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: artifacts/security/checkov.sarif
          category: checkov

      - name: Fail on Checkov findings
        if: steps.checkov.outcome == 'failure'
        shell: bash
        run: |
          echo "::error::Checkov found IaC or pipeline misconfigurations."
          exit 1

  dotnet-build-test:
    name: Dotnet build and test
    runs-on: ubuntu-latest
    needs:
      - quality-check
      - iac-checkov
      - sast-semgrep
      - sast-codeql
      - sast-sonar
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Build solution
        uses: ./.github/actions/build

      - name: Test solution
        uses: ./.github/actions/test

      - name: Upload test artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml

  sast-codeql:
    name: SAST CodeQL
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          languages: csharp
          build-mode: manual
          queries: security-and-quality

      - name: Build solution for CodeQL
        uses: ./.github/actions/build

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          category: /language:csharp

  sast-sonar:
    name: SAST Sonar
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET and restore
        uses: ./.github/actions/setup

      - name: Install SonarScanner for .NET
        shell: bash
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Resolve Sonar configuration
        id: sonar_config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Sonar not configured. Skip Sonar analysis."
            exit 0
          fi

          if [[ -z "${SONAR_PROJECT_KEY}" ]]; then
            echo "::error::SONAR_PROJECT_KEY is required when SONAR_TOKEN is configured."
            exit 1
          fi

          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"

          if [[ "${host_url}" == "https://sonarcloud.io" && -z "${SONAR_ORGANIZATION}" ]]; then
            echo "::error::SONAR_ORGANIZATION is required for SonarCloud analysis."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "host_url=${host_url}" >> "$GITHUB_OUTPUT"

      - name: Begin Sonar analysis
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          args=(
            "/k:${SONAR_PROJECT_KEY}"
            "/d:sonar.host.url=${{ steps.sonar_config.outputs.host_url }}"
            "/d:sonar.token=${SONAR_TOKEN}"
            "/d:sonar.qualitygate.wait=true"
            "/d:sonar.scm.provider=git"
          )

          if [[ -n "${SONAR_ORGANIZATION}" ]]; then
            args+=("/o:${SONAR_ORGANIZATION}")
          fi

          dotnet sonarscanner begin "${args[@]}"

      - name: Build solution for Sonar
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        run: dotnet build DevSecOpsPipelineSample.slnx -c Release --no-restore

      - name: Test solution for Sonar
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        run: >-
          dotnet test DevSecOpsPipelineSample.slnx -c Release --no-build --logger trx --results-directory TestResults --collect:"XPlat Code Coverage"

      - name: End Sonar analysis
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  dotnet-app-sca-security:
    name: Dotnet app SCA security
    runs-on: ubuntu-latest
    needs:
      - dotnet-build-test
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Setup .NET and restore
        uses: ./.github/actions/setup

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Prepare app security directories
        shell: bash
        run: |
          mkdir -p artifacts/publish
          mkdir -p artifacts/sbom/app
          mkdir -p artifacts/security

      - name: Publish app for scan surface
        shell: bash
        run: >-
          dotnet publish src/DevSecOpsPipelineSample.Api/DevSecOpsPipelineSample.Api.csproj
          -c Release
          -o artifacts/publish
          --no-restore

      - name: Generate app SBOM
        shell: bash
        run: >-
          dotnet tool run dotnet-CycloneDX DevSecOpsPipelineSample.slnx
          -o artifacts/sbom/app
          -j

      - name: Run Trivy app scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.github,artifacts,tests
          format: sarif
          output: artifacts/security/trivy-app.sarif
          exit-code: "0"

      - name: Run Trivy app scan JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.github,artifacts,tests
          format: json
          output: artifacts/security/trivy-app.json
          severity: ${{ env.TRIVY_FAIL_SEVERITY }}
          exit-code: "1"
          skip-setup-trivy: true

      - name: Upload Trivy app SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: artifacts/security/trivy-app.sarif
          category: trivy-app

      - name: Run Grype app scan SARIF
        if: always()
        id: grype_app_sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: artifacts/publish
          fail-build: false
          output-format: sarif
          output-file: artifacts/security/grype-app.sarif

      - name: Run Grype app scan JSON
        if: always()
        id: grype_app_json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: artifacts/publish
          fail-build: false
          output-format: json
          output-file: artifacts/security/grype-app.json

      - name: Upload Grype app SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: artifacts/security/grype-app.sarif
          category: grype-app

      - name: Run Snyk app scan
        id: snyk_app_scan
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [[ -z "${SNYK_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "status=0" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN not configured. Skip Snyk app scan."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          set +e
          snyk test \
            --file=src/DevSecOpsPipelineSample.Api/DevSecOpsPipelineSample.Api.csproj \
            --severity-threshold=high \
            --sarif-file-output=artifacts/security/snyk-app.sarif
          status=$?
          set -e
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Upload Snyk app SARIF
        if: always() && steps.snyk_app_scan.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: artifacts/security/snyk-app.sarif
          category: snyk-app

      - name: Fail on Snyk app findings
        if: always() && steps.snyk_app_scan.outputs.enabled == 'true' && steps.snyk_app_scan.outputs.status != '0'
        shell: bash
        run: |
          echo "::error::Snyk app scan found high or critical vulnerabilities."
          exit "${{ steps.snyk_app_scan.outputs.status }}"

      - name: Upload app SBOM to Dependency-Track
        if: always()
        shell: bash
        env:
          DEPENDENCY_TRACK_URL: ${{ secrets.DEPENDENCY_TRACK_URL }}
          DEPENDENCY_TRACK_API_KEY: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
        run: |
          if [[ -z "${DEPENDENCY_TRACK_URL}" || -z "${DEPENDENCY_TRACK_API_KEY}" ]]; then
            echo "Dependency-Track secrets not configured. Skip app SBOM upload."
            exit 0
          fi

          APP_SBOM_FILE="$(find artifacts/sbom/app -type f -name '*.json' | head -n 1)"
          curl -fsS -X POST "${DEPENDENCY_TRACK_URL}/api/v1/bom" \
            -H "X-Api-Key: ${DEPENDENCY_TRACK_API_KEY}" \
            -F "autoCreate=true" \
            -F "projectName=${APP_SBOM_PROJECT_NAME}" \
            -F "projectVersion=${GITHUB_SHA}" \
            -F "bom=@${APP_SBOM_FILE}"

      - name: Upload app security artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-security-artifacts
          path: |
            artifacts/sbom/app/**
            artifacts/security/snyk-app.sarif
            artifacts/security/trivy-app.*
            artifacts/security/grype-app.*

  image-build:
    name: Build container image
    runs-on: ubuntu-latest
    needs:
      - dotnet-app-sca-security
    outputs:
      image-name: ${{ steps.meta.outputs.image_name }}
      image-ref: ${{ steps.meta.outputs.image_ref }}
      image-tag: ${{ steps.meta.outputs.image_tag }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Normalize repository name
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        shell: bash
        run: docker build -t "${{ steps.meta.outputs.image_ref }}" .

      - name: Save container image artifact
        shell: bash
        run: docker save "${{ steps.meta.outputs.image_ref }}" | gzip > "${IMAGE_TAR_PATH}"

      - name: Upload container image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: container-image
          path: ${{ env.IMAGE_TAR_PATH }}

  image-sca-security:
    name: SCA Image security
    runs-on: ubuntu-latest
    needs:
      - image-build
    outputs:
      image-name: ${{ steps.image_meta.outputs.image_name }}
      image-ref: ${{ steps.image_meta.outputs.image_ref }}
      image-tag: ${{ steps.image_meta.outputs.image_tag }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Download container image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: container-image

      - name: Load container image
        shell: bash
        run: docker load < "${IMAGE_TAR_PATH}"

      - name: Expose image metadata
        id: image_meta
        shell: bash
        run: |
          echo "image_name=${{ needs.image-build.outputs.image-name }}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ needs.image-build.outputs.image-ref }}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ needs.image-build.outputs.image-tag }}" >> "$GITHUB_OUTPUT"

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Prepare image security directories
        shell: bash
        run: |
          mkdir -p artifacts/sbom/image
          mkdir -p artifacts/security

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          format: cyclonedx-json
          output-file: artifacts/sbom/image/image.cdx.json
          artifact-name: image-sbom.cdx.json
          upload-artifact: false

      - name: Run Trivy image scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: artifacts/security/trivy-image.sarif
          exit-code: "0"

      - name: Run Trivy image scan JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln,secret,misconfig
          format: json
          output: artifacts/security/trivy-image.json
          severity: ${{ env.TRIVY_FAIL_SEVERITY }}
          exit-code: "1"
          skip-setup-trivy: true

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: artifacts/security/trivy-image.sarif
          category: trivy-image

      - name: Run Grype image scan SARIF
        if: always()
        id: grype_image_sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          fail-build: false
          output-format: sarif
          output-file: artifacts/security/grype-image.sarif

      - name: Run Grype image scan JSON
        if: always()
        id: grype_image_json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          fail-build: false
          output-format: json
          output-file: artifacts/security/grype-image.json

      - name: Upload Grype image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: artifacts/security/grype-image.sarif
          category: grype-image

      - name: Run Snyk image scan
        id: snyk_image_scan
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [[ -z "${SNYK_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "status=0" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN not configured. Skip Snyk image scan."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          set +e
          snyk container test "${{ needs.image-build.outputs.image-ref }}" \
            --severity-threshold=high \
            --sarif-file-output=artifacts/security/snyk-image.sarif
          status=$?
          set -e
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Upload Snyk image SARIF
        if: always() && steps.snyk_image_scan.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
        with:
          sarif_file: artifacts/security/snyk-image.sarif
          category: snyk-image

      - name: Fail on Snyk image findings
        if: always() && steps.snyk_image_scan.outputs.enabled == 'true' && steps.snyk_image_scan.outputs.status != '0'
        shell: bash
        run: |
          echo "::error::Snyk image scan found high or critical vulnerabilities."
          exit "${{ steps.snyk_image_scan.outputs.status }}"

      - name: Upload image SBOM to Dependency-Track
        if: always()
        shell: bash
        env:
          DEPENDENCY_TRACK_URL: ${{ secrets.DEPENDENCY_TRACK_URL }}
          DEPENDENCY_TRACK_API_KEY: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
        run: |
          if [[ -z "${DEPENDENCY_TRACK_URL}" || -z "${DEPENDENCY_TRACK_API_KEY}" ]]; then
            echo "Dependency-Track secrets not configured. Skip image SBOM upload."
            exit 0
          fi

          curl -fsS -X POST "${DEPENDENCY_TRACK_URL}/api/v1/bom" \
            -H "X-Api-Key: ${DEPENDENCY_TRACK_API_KEY}" \
            -F "autoCreate=true" \
            -F "projectName=${APP_SBOM_PROJECT_NAME}-image" \
            -F "projectVersion=${GITHUB_SHA}" \
            -F "bom=@artifacts/sbom/image/image.cdx.json"

      - name: Upload image security artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: image-security-artifacts
          path: |
            artifacts/sbom/image/**
            artifacts/security/snyk-image.sarif
            artifacts/security/trivy-image.*
            artifacts/security/grype-image.*

  security-gate:
    name: Security gate
    if: always()
    runs-on: ubuntu-latest
    needs:
      - dotnet-app-sca-security
      - image-sca-security
    outputs:
      gate-status: ${{ steps.evaluate.outputs.gate_status }}
    permissions:
      contents: read
    steps:
      - name: Evaluate security gate
        id: evaluate
        shell: bash
        run: |
          mkdir -p reports

          APP_RESULT="${{ needs.dotnet-app-sca-security.result }}"
          IMAGE_RESULT="${{ needs.image-sca-security.result }}"

          if [[ "${APP_RESULT}" == "success" && "${IMAGE_RESULT}" == "success" ]]; then
            GATE_STATUS="PASS"
            GATE_MESSAGE="Application and image security stages passed."
          else
            GATE_STATUS="FAIL"
            GATE_MESSAGE="One or more security stages failed."
          fi

          cat > reports/security-gate-report.md <<EOF
          # Security Gate Report

          - Gate status: ${GATE_STATUS}
          - App security result: ${APP_RESULT}
          - Image security result: ${IMAGE_RESULT}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          ${GATE_MESSAGE}
          EOF

          echo "gate_status=${GATE_STATUS}" >> "$GITHUB_OUTPUT"

          {
            echo "## Security Gate"
            echo ""
            echo "- Gate status: ${GATE_STATUS}"
            echo "- App security: ${APP_RESULT}"
            echo "- Image security: ${IMAGE_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${GATE_STATUS}" != "PASS" ]]; then
            echo "::error::Security gate failed."
            exit 1
          fi

      - name: Upload security gate report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-gate-report
          path: reports/security-gate-report.md

  image-publish:
    name: Publish container image
    if: github.event_name == 'workflow_dispatch' && inputs.publish_image
    needs:
      - security-gate
      - image-sca-security
    outputs:
      image-ref: ${{ steps.push.outputs.image_ref }}
      image-digest: ${{ steps.push.outputs.image_digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download container image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: container-image

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Load image for publish
        shell: bash
        run: docker load < "${IMAGE_TAR_PATH}"

      - name: Push image
        id: push
        shell: bash
        run: |
          IMAGE_REF="${{ needs.image-sca-security.outputs.image-ref }}"
          docker push "${IMAGE_REF}"
          IMAGE_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REF}" | awk -F@ '{print $2}')"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

  attest:
    name: Attest image provenance
    if: github.event_name == 'workflow_dispatch' && inputs.publish_image
    needs:
      - image-sign
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Attest published image
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ needs.image-sign.outputs.image-repository }}
          subject-digest: ${{ needs.image-sign.outputs.image-digest }}

  image-sign:
    name: Sign container image
    if: github.event_name == 'workflow_dispatch' && inputs.publish_image
    needs:
      - image-publish
    runs-on: ubuntu-latest
    outputs:
      image-repository: ${{ steps.sign.outputs.image_repository }}
      image-digest: ${{ steps.sign.outputs.image_digest }}
      image-with-digest: ${{ steps.sign.outputs.image_with_digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Download image security artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: image-security-artifacts
          path: ghcr-evidence/image-security

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
        with:
          cosign-release: v3.0.6

      - name: Attach image SBOM to published image
        shell: bash
        run: |
          IMAGE_REPOSITORY="${{ needs.image-publish.outputs.image-ref }}"
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY%:*}"
          IMAGE_DIGEST="${{ needs.image-publish.outputs.image-digest }}"
          IMAGE_WITH_DIGEST="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          IMAGE_SBOM_FILE="$(find ghcr-evidence/image-security -type f \( -name 'image.cdx.json' -o -name '*.cdx.json' \) | head -n 1)"

          if [[ -z "${IMAGE_SBOM_FILE}" ]]; then
            echo "::error::Image SBOM file not found for GHCR attachment."
            exit 1
          fi

          cosign attach sbom --sbom "${IMAGE_SBOM_FILE}" "${IMAGE_WITH_DIGEST}"

      - name: Sign published image with GitHub OIDC
        id: sign
        shell: bash
        run: |
          IMAGE_REPOSITORY="${{ needs.image-publish.outputs.image-ref }}"
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY%:*}"
          IMAGE_DIGEST="${{ needs.image-publish.outputs.image-digest }}"
          IMAGE_WITH_DIGEST="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          cosign sign --yes "${IMAGE_WITH_DIGEST}"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image_with_digest=${IMAGE_WITH_DIGEST}" >> "$GITHUB_OUTPUT"

  verify-image-signature:
    name: Verify image signature
    if: github.event_name == 'workflow_dispatch' && inputs.publish_image
    needs:
      - image-sign
    outputs:
      image-with-digest: ${{ steps.verified_image.outputs.image_with_digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
        with:
          cosign-release: v3.0.6

      - name: Verify keyless image signature
        id: verified_image
        shell: bash
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/${{ github.workflow_ref }}" \
            "${{ needs.image-sign.outputs.image-with-digest }}"
          echo "image_with_digest=${{ needs.image-sign.outputs.image-with-digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Azure Container Apps
    if: github.event_name == 'workflow_dispatch' && inputs.publish_image && inputs.deploy
    needs:
      - verify-image-signature
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      app-url: ${{ steps.resolve_app_url.outputs.app_url }}
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Validate deploy inputs
        shell: bash
        run: |
          missing=()
          [[ -z "${{ inputs.environment }}" ]] && missing+=("environment")
          [[ -z "${{ inputs.resource_group }}" ]] && missing+=("resource_group")
          [[ -z "${{ inputs.container_app_name }}" ]] && missing+=("container_app_name")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required deploy inputs: ${missing[*]}"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Azure login
        uses: Azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container image
        uses: Azure/cli@089eac9d8cc39f5d003e94f8b65efc51076c9cbd # v2.1.0
        with:
          inlineScript: >-
            az containerapp update
            --name "${{ inputs.container_app_name }}"
            --resource-group "${{ inputs.resource_group }}"
            --image "${{ needs.verify-image-signature.outputs.image-with-digest }}"

      - name: Resolve staged API URL
        id: resolve_app_url
        uses: Azure/cli@089eac9d8cc39f5d003e94f8b65efc51076c9cbd # v2.1.0
        with:
          inlineScript: |
            if [[ -n "${{ inputs.staged_api_url }}" ]]; then
              echo "app_url=${{ inputs.staged_api_url }}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            FQDN="$(az containerapp show \
              --name "${{ inputs.container_app_name }}" \
              --resource-group "${{ inputs.resource_group }}" \
              --query properties.configuration.ingress.fqdn \
              -o tsv)"

            if [[ -z "${FQDN}" ]]; then
              echo "::error::Unable to resolve public Container App FQDN. Set staged_api_url input for ZAP baseline scan."
              exit 1
            fi

            echo "app_url=https://${FQDN}" >> "$GITHUB_OUTPUT"

  zap-baseline:
    name: ZAP baseline staged API scan
    if: github.event_name == 'workflow_dispatch' && inputs.publish_image && inputs.deploy
    needs:
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@2b5fc7f98d837319798ab7f128ea50b7d40563b6 # v0.14.0
        with:
          target: ${{ needs.deploy.outputs.app-url }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          cmd_options: -a
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-baseline-report

  record-and-notify:
    name: Record and notify
    if: always()
    runs-on: ubuntu-latest
    needs:
      - dotnet-build-test
      - dotnet-app-sca-security
      - image-sca-security
      - security-gate
      - image-publish
      - image-sign
      - verify-image-signature
      - deploy
      - zap-baseline
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download test results
        if: always() && needs.dotnet-build-test.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: test-results
          path: release-evidence/test-results

      - name: Download app security artifacts
        if: always() && needs.dotnet-app-sca-security.result != 'skipped'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: app-security-artifacts
          path: release-evidence/app-security

      - name: Download image security artifacts
        if: always() && needs.image-sca-security.result != 'skipped'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: image-security-artifacts
          path: release-evidence/image-security

      - name: Download security gate report
        if: always() && needs.security-gate.result != 'skipped'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: security-gate-report
          path: release-evidence/security-gate

      - name: Download ZAP report
        if: always() && needs.zap-baseline.result != 'skipped'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: zap-baseline-report
          path: release-evidence/zap-baseline

      - name: Create release evidence summary
        id: evidence
        shell: bash
        run: |
          mkdir -p release-evidence

          cat > release-evidence/build-metadata.json <<EOF
          {
            "build": {
              "name": "DevSecOpsPipelineSample",
              "number": "${GITHUB_RUN_NUMBER}",
              "version": "${GITHUB_SHA}",
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "vcs": {
                "revision": "${GITHUB_SHA}",
                "branch": "${GITHUB_REF_NAME}",
                "url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
              }
            },
            "security": {
              "gate": {
                "status": "${{ needs.security-gate.outputs.gate-status || 'SKIPPED' }}"
              },
              "stages": {
                "appSecurity": "${{ needs.dotnet-app-sca-security.result }}",
                "imageSecurity": "${{ needs.image-sca-security.result }}",
                "signatureVerification": "${{ needs.verify-image-signature.result }}",
                "dast": "${{ needs.zap-baseline.result }}"
              }
            },
            "artifacts": {
              "publishedImageRef": "${{ needs.image-publish.outputs.image-ref }}",
              "publishedImageDigest": "${{ needs.image-publish.outputs.image-digest }}",
              "verifiedImageWithDigest": "${{ needs.verify-image-signature.outputs.image-with-digest }}",
              "releaseEvidenceArtifact": "release-evidence"
            },
            "deployment": {
              "result": "${{ needs.deploy.result }}",
              "stagedAppUrl": "${{ needs.deploy.outputs.app-url }}"
            }
          }
          EOF

          cat > release-evidence/pipeline-summary.md <<EOF
          # DevSecOps Pipeline Summary

          - Security gate: ${{ needs.security-gate.outputs.gate-status || 'SKIPPED' }}
          - Build and test: ${{ needs.dotnet-build-test.result }}
          - App security: ${{ needs.dotnet-app-sca-security.result }}
          - Image security: ${{ needs.image-sca-security.result }}
          - Image publish: ${{ needs.image-publish.result }}
          - Image sign: ${{ needs.image-sign.result }}
          - Signature verify: ${{ needs.verify-image-signature.result }}
          - Deploy: ${{ needs.deploy.result }}
          - ZAP baseline: ${{ needs.zap-baseline.result }}
          - Published image ref: ${{ needs.image-publish.outputs.image-ref }}
          - Published image digest: ${{ needs.image-publish.outputs.image-digest }}
          - Verified image digest ref: ${{ needs.verify-image-signature.outputs.image-with-digest }}
          - Image SBOM attached to GHCR: yes
          - Staged app URL: ${{ needs.deploy.outputs.app-url }}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          cat > release-evidence/pipeline-summary.json <<EOF
          {
            "securityGate": "${{ needs.security-gate.outputs.gate-status || 'SKIPPED' }}",
            "buildAndTest": "${{ needs.dotnet-build-test.result }}",
            "appSecurity": "${{ needs.dotnet-app-sca-security.result }}",
            "imageSecurity": "${{ needs.image-sca-security.result }}",
            "imagePublish": "${{ needs.image-publish.result }}",
            "imageSign": "${{ needs.image-sign.result }}",
            "verifyImageSignature": "${{ needs.verify-image-signature.result }}",
            "deploy": "${{ needs.deploy.result }}",
            "zapBaseline": "${{ needs.zap-baseline.result }}",
            "publishedImageRef": "${{ needs.image-publish.outputs.image-ref }}",
            "publishedImageDigest": "${{ needs.image-publish.outputs.image-digest }}",
            "verifiedImageWithDigest": "${{ needs.verify-image-signature.outputs.image-with-digest }}",
            "stagedAppUrl": "${{ needs.deploy.outputs.app-url }}",
            "commit": "${GITHUB_SHA}",
            "runUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF

          cat release-evidence/pipeline-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release evidence bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-evidence
          path: release-evidence/**

      - name: Comment on pull request
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -f body="$(cat release-evidence/pipeline-summary.md)"
