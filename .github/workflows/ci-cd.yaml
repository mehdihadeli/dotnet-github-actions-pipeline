name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/ci-cd.yaml
      - Dockerfile
      - global.json
      - Directory.Build.props
      - DevSecOpsPipelineSample.slnx
      - dotnet-tools.json
      - "!**.md"
  pull_request:
    paths:
      - src/**
      - tests/**
      - .github/actions/**
      - .github/workflows/ci-cd.yaml
      - Dockerfile
      - global.json
      - Directory.Build.props
      - DevSecOpsPipelineSample.slnx
      - dotnet-tools.json
  workflow_dispatch:
    inputs:
      publish_image:
        description: Whether to publish container image.
        type: boolean
        required: true
        default: false
      deploy:
        description: Whether to deploy image to Azure Container Apps.
        type: boolean
        required: true
        default: false
      environment:
        description: GitHub environment name for deployment.
        type: environment
        required: false
      resource_group:
        description: Azure resource group with existing Container App.
        type: string
        required: false
      container_app_name:
        description: Existing Azure Container App name.
        type: string
        required: false
      staged_api_url:
        description: Optional public URL for staged API ZAP baseline scan.
        type: string
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  HUSKY: 0
  APP_SBOM_PROJECT_NAME: DevSecOpsPipelineSample
  REGISTRY: ghcr.io
  IMAGE_TAR_PATH: image.tar.gz
  TRIVY_FAIL_SEVERITY: CRITICAL,HIGH

jobs:
  quality-check:
    name: Quality check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Checks out repository files so later steps can read source and config.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Runs shared formatting validation for source files.
      - name: Validate formatting
        uses: ./.github/actions/format

      # Runs shared code style validation.
      - name: Validate style
        uses: ./.github/actions/style

      # Runs shared .NET analyzer checks.
      - name: Run analyzers
        uses: ./.github/actions/analyzers

      # Scans repository history and files for leaked secrets.
      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

      # Lints the Dockerfile with Hadolint container rules.
      - name: Lint Dockerfile
        shell: bash
        run: docker run --rm -i hadolint/hadolint < Dockerfile

  sast-semgrep:
    name: SAST Semgrep
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      # Checks out repository files for the Semgrep scan.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Creates output folders used by Semgrep artifacts.
      - name: Prepare Semgrep artifacts
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/security

      - name: Run Semgrep SAST
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
            --config p/security-audit \
            --error \
            --metrics=off \
            --exclude .git \
            --exclude artifacts \
            --exclude tests \
            --sarif \
            --output artifacts/security/semgrep.sarif \
            .

      # Uploads SARIF results to GitHub Code Scanning in the Security tab.
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/semgrep.sarif
          category: semgrep

  iac-checkov:
    name: IaC Checkov
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      # Checks out repository files for the IaC scan.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Creates output folders used by Checkov artifacts.
      - name: Prepare Checkov artifacts
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/security

      # Scans workflow, Dockerfile, and secret patterns for misconfiguration.
      - name: Run Checkov IaC scan
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@1f0ef821c5e4e9c5c9ae9550701402d75c9608b5 # v12.3076.0
        with:
          directory: .
          framework: github_actions,dockerfile,secrets
          quiet: true
          output_format: cli,sarif
          output_file_path: console,artifacts/security/checkov.sarif

      # Uploads SARIF results to GitHub Code Scanning in the Security tab.
      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/checkov.sarif
          category: checkov

      # Converts Checkov findings into a failing job when results are non-empty.
      - name: Fail on Checkov findings
        if: steps.checkov.outcome == 'failure'
        shell: bash
        run: |
          echo "::error::Checkov found IaC or pipeline misconfigurations."
          exit 1

  sast-codeql:
    name: SAST CodeQL
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
      security-events: write
    steps:
      # Checks out repository files for CodeQL analysis.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Prepares the CodeQL database and query set for C#.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: manual
          queries: security-and-quality

      # Builds the app so CodeQL can analyze compiled sources.
      - name: Build solution for CodeQL
        uses: ./.github/actions/build

      # Runs CodeQL queries and uploads results to code scanning.
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:csharp

  sast-sonar:
    name: SAST Sonar
    runs-on: ubuntu-latest
    needs:
      - quality-check
    permissions:
      contents: read
    steps:
      # Checks out repository files for Sonar analysis.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Installs Java required by SonarScanner.
      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"

      # Restores .NET SDK, tools, and packages used by the scan.
      - name: Setup .NET and restore
        uses: ./.github/actions/setup

      # Installs SonarScanner as a .NET global tool for later analysis steps.
      - name: Install SonarScanner for .NET
        shell: bash
        run: dotnet tool install --global dotnet-sonarscanner

      # Validates Sonar secrets and resolves final scanner configuration.
      - name: Resolve Sonar configuration
        id: sonar_config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Sonar not configured. Skip Sonar analysis."
            exit 0
          fi

          if [[ -z "${SONAR_PROJECT_KEY}" ]]; then
            echo "::error::SONAR_PROJECT_KEY is required when SONAR_TOKEN is configured."
            exit 1
          fi

          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"

          if [[ "${host_url}" == "https://sonarcloud.io" && -z "${SONAR_ORGANIZATION}" ]]; then
            echo "::error::SONAR_ORGANIZATION is required for SonarCloud analysis."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "host_url=${host_url}" >> "$GITHUB_OUTPUT"

      # Starts the Sonar analysis session before build and test execution.
      - name: Begin Sonar analysis
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_HOST_URL: ${{ steps.sonar_config.outputs.host_url }}
        run: |
          args=(
            "/k:${SONAR_PROJECT_KEY}"
            "/d:sonar.host.url=${SONAR_HOST_URL}"
            "/d:sonar.token=${SONAR_TOKEN}"
            "/d:sonar.qualitygate.wait=true"
            "/d:sonar.scm.provider=git"
          )

          if [[ -n "${SONAR_ORGANIZATION}" ]]; then
            args+=("/o:${SONAR_ORGANIZATION}")
          fi

          dotnet sonarscanner begin "${args[@]}"

      # Builds the app during the active Sonar analysis window.
      - name: Build solution for Sonar
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: ./.github/actions/build

      # Runs tests so Sonar can ingest test-related signals.
      - name: Test solution for Sonar
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: ./.github/actions/test

      - name: End Sonar analysis
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  dotnet-build-test:
    name: Dotnet build and test
    runs-on: ubuntu-latest
    needs:
      - quality-check
      - iac-checkov
      - sast-semgrep
      - sast-codeql
      - sast-sonar
    permissions:
      contents: read
    steps:
      # Checks out repository files for build and test.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Runs the shared build task.
      - name: Build solution
        uses: ./.github/actions/build

      # Runs the shared automated test task.
      - name: Test solution
        uses: ./.github/actions/test

      # Stores test reports and coverage for later jobs.
      - name: Upload test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml

  dotnet-app-sca-security:
    name: Dotnet app SCA security
    runs-on: ubuntu-latest
    needs:
      - dotnet-build-test
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      # Checks out repository files for dependency and vulnerability scans.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Restores SDK, tools, Husky, and NuGet dependencies.
      - name: Setup .NET and restore
        uses: ./.github/actions/setup

      # Installs the Snyk CLI used by later scan steps.
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      # Installs Cosign for detached SBOM signing on trusted workflow runs.
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      # Creates folders for publish output, SBOM files, and scan reports.
      - name: Prepare app security directories
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/publish
            artifacts/sbom/app
            artifacts/security

      # Publishes the app so file-system scanners inspect release output.
      - name: Publish app for scan surface
        shell: bash
        run: >-
          dotnet publish src/DevSecOpsPipelineSample.Api/DevSecOpsPipelineSample.Api.csproj
          -c Release
          -o artifacts/publish
          --no-restore

      # Generates an application CycloneDX SBOM from the solution.
      - name: Generate app SBOM
        shell: bash
        run: >-
          dotnet tool run dotnet-CycloneDX DevSecOpsPipelineSample.slnx
          -o artifacts/sbom/app
          -j

      # Signs the generated app SBOM and writes a detached verification bundle.
      - name: Sign app SBOM
        if: github.event_name != 'pull_request'
        shell: bash
        run: >-
          cosign sign-blob --yes
          --bundle artifacts/sbom/app/bom.sigstore.json
          artifacts/sbom/app/bom.json

      # Verifies the detached app SBOM bundle against this workflow identity.
      - name: Verify app SBOM signature
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: >-
          cosign verify-blob
          --bundle artifacts/sbom/app/bom.sigstore.json
          --certificate-identity-regexp '^https://github.com/.+$'
          --certificate-oidc-issuer https://token.actions.githubusercontent.com
          --certificate-github-workflow-repository "$GITHUB_REPOSITORY"
          --certificate-github-workflow-ref "$GITHUB_REF"
          --certificate-github-workflow-sha "$GITHUB_SHA"
          --certificate-github-workflow-trigger "$GITHUB_EVENT_NAME"
          artifacts/sbom/app/bom.json

      # Scans source and published files with Trivy and writes SARIF output.
      - name: Run Trivy app scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.github,artifacts,tests
          format: sarif
          output: artifacts/security/trivy-app.sarif
          exit-code: "0"

      # Produces JSON findings for Trivy policy enforcement and evidence.
      - name: Run Trivy app scan JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.github,artifacts,tests
          format: json
          output: artifacts/security/trivy-app.json
          severity: ${{ env.TRIVY_FAIL_SEVERITY }}
          exit-code: "1"
          skip-setup-trivy: true

      # Uploads SARIF results to GitHub Code Scanning in the Security tab.
      - name: Upload Trivy app SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/trivy-app.sarif
          category: trivy-app

      # Scans published app contents with Grype and writes SARIF output.
      - name: Run Grype app scan SARIF
        if: always()
        id: grype_app_sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: artifacts/publish
          fail-build: false
          output-format: sarif
          output-file: artifacts/security/grype-app.sarif

      # Produces JSON findings for Grype evidence and gating.
      - name: Run Grype app scan JSON
        if: always()
        id: grype_app_json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: artifacts/publish
          fail-build: false
          output-format: json
          output-file: artifacts/security/grype-app.json

      # Uploads SARIF results to GitHub Code Scanning in the Security tab.
      - name: Upload Grype app SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/grype-app.sarif
          category: grype-app

      - name: Run Snyk app scan
        id: snyk_app_scan
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [[ -z "${SNYK_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "status=0" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN not configured. Skip Snyk app scan."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          set +e
          snyk test \
            --file=src/DevSecOpsPipelineSample.Api/DevSecOpsPipelineSample.Api.csproj \
            --severity-threshold=high \
            --sarif-file-output=artifacts/security/snyk-app.sarif
          status=$?
          set -e
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      # Uploads SARIF results to GitHub Code Scanning in the Security tab.
      - name: Upload Snyk app SARIF
        if: always() && steps.snyk_app_scan.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/snyk-app.sarif
          category: snyk-app

      # Fails the job when Snyk reported blocking findings.
      - name: Fail on Snyk app findings
        if: always() && steps.snyk_app_scan.outputs.enabled == 'true' && steps.snyk_app_scan.outputs.status != '0'
        uses: ./.github/actions/fail-on-snyk-findings
        with:
          status: ${{ steps.snyk_app_scan.outputs.status }}
          message: Snyk app scan found high or critical vulnerabilities.

      # Uploads the generated SBOM into Dependency-Track for tracking.
      - name: Upload app SBOM to Dependency-Track
        if: always()
        uses: ./.github/actions/upload-dependency-track-bom
        with:
          dependency-track-url: ${{ secrets.DEPENDENCY_TRACK_URL }}
          dependency-track-api-key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          bom-file: artifacts/sbom/app/bom.json
          project-name: ${{ env.APP_SBOM_PROJECT_NAME }}
          project-version: ${{ github.sha }}

      # Stores scan outputs and SBOM files for later jobs.
      - name: Upload app security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-security-artifacts
          path: |
            artifacts/sbom/app/**
            artifacts/security/snyk-app.sarif
            artifacts/security/trivy-app.*
            artifacts/security/grype-app.*

  image-build:
    name: Build container image
    runs-on: ubuntu-latest
    needs:
      - dotnet-app-sca-security
    outputs:
      image-name: ${{ steps.meta.outputs.image_name }}
      image-ref: ${{ steps.meta.outputs.image_ref }}
      image-tag: ${{ steps.meta.outputs.image_tag }}
    permissions:
      contents: read
    steps:
      # Checks out repository files needed to build the image.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Normalizes repository metadata into deterministic image names and tags.
      - name: Normalize repository name
        id: meta
        shell: bash
        env:
          REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          IMAGE_NAME="$(echo "$REPOSITORY_NAME" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            IMAGE_TAG="$GITHUB_REF_NAME"
          else
            IMAGE_TAG="$SHORT_SHA"
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      # Builds the local container image used by downstream security jobs.
      - name: Build container image
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
        run: docker build -t "$IMAGE_REF" .

      # Archives the built image into a compressed artifact.
      - name: Save container image artifact
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
        run: docker save "$IMAGE_REF" | gzip > "$IMAGE_TAR_PATH"

      # Stores the built image as an artifact for downstream jobs.
      - name: Upload container image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-image
          path: ${{ env.IMAGE_TAR_PATH }}

  image-sca-security:
    name: SCA Image security
    runs-on: ubuntu-latest
    needs:
      - image-build
    outputs:
      image-name: ${{ steps.image_meta.outputs.image_name }}
      image-ref: ${{ steps.image_meta.outputs.image_ref }}
      image-tag: ${{ steps.image_meta.outputs.image_tag }}
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      # Checks out repository files for image scanning context.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Restores the previously built image artifact into this job.
      - name: Download container image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: container-image

      # Loads the downloaded image archive into the local Docker daemon.
      - name: Load container image
        shell: bash
        run: docker load < "${IMAGE_TAR_PATH}"

      # Copies upstream image outputs into local step outputs for reuse.
      - name: Expose image metadata
        id: image_meta
        shell: bash
        env:
          IMAGE_NAME: ${{ needs.image-build.outputs.image-name }}
          IMAGE_REF: ${{ needs.image-build.outputs.image-ref }}
          IMAGE_TAG: ${{ needs.image-build.outputs.image-tag }}
        run: |
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # Installs the Snyk CLI used by later image scan steps.
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      # Installs Cosign for detached SBOM signing on trusted workflow runs.
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      # Creates folders for image SBOM files and scan reports.
      - name: Prepare image security directories
        uses: ./.github/actions/prepare-directories
        with:
          directories: |
            artifacts/sbom/image
            artifacts/security

      # Generates a CycloneDX SBOM from the built container image.
      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          format: cyclonedx-json
          output-file: artifacts/sbom/image/image.cdx.json
          artifact-name: image-sbom.cdx.json
          upload-artifact: false

      # Signs the generated image SBOM and writes a detached verification bundle.
      - name: Sign image SBOM
        if: github.event_name != 'pull_request'
        shell: bash
        run: >-
          cosign sign-blob --yes
          --bundle artifacts/sbom/image/image-sbom.sigstore.json
          artifacts/sbom/image/image.cdx.json

      # Verifies the detached image SBOM bundle against this workflow identity.
      - name: Verify image SBOM signature
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: >-
          cosign verify-blob
          --bundle artifacts/sbom/image/image-sbom.sigstore.json
          --certificate-identity-regexp '^https://github.com/.+$'
          --certificate-oidc-issuer https://token.actions.githubusercontent.com
          --certificate-github-workflow-repository "$GITHUB_REPOSITORY"
          --certificate-github-workflow-ref "$GITHUB_REF"
          --certificate-github-workflow-sha "$GITHUB_SHA"
          --certificate-github-workflow-trigger "$GITHUB_EVENT_NAME"
          artifacts/sbom/image/image.cdx.json

      # Scans the image with Trivy and writes SARIF output.
      - name: Run Trivy image scan SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: artifacts/security/trivy-image.sarif
          exit-code: "0"

      # Produces JSON findings for Trivy policy enforcement and evidence.
      - name: Run Trivy image scan JSON
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln,secret,misconfig
          format: json
          output: artifacts/security/trivy-image.json
          severity: ${{ env.TRIVY_FAIL_SEVERITY }}
          exit-code: "1"
          skip-setup-trivy: true

      # Uploads SARIF results to GitHub Code Scanning in the Security tab.
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/trivy-image.sarif
          category: trivy-image

      # Scans the image with Grype and writes SARIF output.
      - name: Run Grype image scan SARIF
        if: always()
        id: grype_image_sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          fail-build: false
          output-format: sarif
          output-file: artifacts/security/grype-image.sarif

      # Produces JSON findings for Grype evidence and gating.
      - name: Run Grype image scan JSON
        if: always()
        id: grype_image_json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          fail-build: false
          output-format: json
          output-file: artifacts/security/grype-image.json

      # Uploads SARIF results to GitHub Code Scanning in the Security tab.
      - name: Upload Grype image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/grype-image.sarif
          category: grype-image

      - name: Run Snyk image scan
        id: snyk_image_scan
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          IMAGE_REF: ${{ needs.image-build.outputs.image-ref }}
        run: |
          if [[ -z "${SNYK_TOKEN}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "status=0" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN not configured. Skip Snyk image scan."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          set +e
          snyk container test "$IMAGE_REF" \
            --severity-threshold=high \
            --sarif-file-output=artifacts/security/snyk-image.sarif
          status=$?
          set -e
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      # Uploads SARIF results to GitHub Code Scanning in the Security tab.
      - name: Upload Snyk image SARIF
        if: always() && steps.snyk_image_scan.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/security/snyk-image.sarif
          category: snyk-image

      # Fails the job when Snyk reported blocking findings.
      - name: Fail on Snyk image findings
        if: always() && steps.snyk_image_scan.outputs.enabled == 'true' && steps.snyk_image_scan.outputs.status != '0'
        uses: ./.github/actions/fail-on-snyk-findings
        with:
          status: ${{ steps.snyk_image_scan.outputs.status }}
          message: Snyk image scan found high or critical vulnerabilities.

      # Uploads the generated image SBOM into Dependency-Track.
      - name: Upload image SBOM to Dependency-Track
        if: always()
        uses: ./.github/actions/upload-dependency-track-bom
        with:
          dependency-track-url: ${{ secrets.DEPENDENCY_TRACK_URL }}
          dependency-track-api-key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          bom-file: artifacts/sbom/image/image.cdx.json
          project-name: ${{ env.APP_SBOM_PROJECT_NAME }}-image
          project-version: ${{ github.sha }}

      # Stores image scan outputs and SBOM files for later jobs.
      - name: Upload image security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-security-artifacts
          path: |
            artifacts/sbom/image/**
            artifacts/security/snyk-image.sarif
            artifacts/security/trivy-image.*
            artifacts/security/grype-image.*

  security-gate:
    name: Security gate
    if: always()
    runs-on: ubuntu-latest
    needs:
      - dotnet-app-sca-security
      - image-sca-security
    outputs:
      gate-status: ${{ steps.evaluate.outputs.gate_status }}
    permissions:
      contents: read
    steps:
      # Aggregates app and image scan outcomes into one gate decision.
      - name: Evaluate security gate
        id: evaluate
        shell: bash
        env:
          APP_RESULT: ${{ needs.dotnet-app-sca-security.result }}
          IMAGE_RESULT: ${{ needs.image-sca-security.result }}
        run: |
          mkdir -p reports

          if [[ "${APP_RESULT}" == "success" && "${IMAGE_RESULT}" == "success" ]]; then
            GATE_STATUS="PASS"
            GATE_MESSAGE="Application and image security stages passed."
          else
            GATE_STATUS="FAIL"
            GATE_MESSAGE="One or more security stages failed."
          fi

          cat > reports/security-gate-report.md <<EOF
          # Security Gate Report

          - Gate status: ${GATE_STATUS}
          - App security result: ${APP_RESULT}
          - Image security result: ${IMAGE_RESULT}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          ${GATE_MESSAGE}
          EOF

          echo "gate_status=${GATE_STATUS}" >> "$GITHUB_OUTPUT"

          {
            echo "## Security Gate"
            echo ""
            echo "- Gate status: ${GATE_STATUS}"
            echo "- App security: ${APP_RESULT}"
            echo "- Image security: ${IMAGE_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${GATE_STATUS}" != "PASS" ]]; then
            echo "::error::Security gate failed."
            exit 1
          fi

      # Stores the generated gate report for later evidence collection.
      - name: Upload security gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-gate-report
          path: reports/security-gate-report.md

  image-publish:
    name: Publish container image
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - security-gate
      - image-sca-security
    outputs:
      image-ref: ${{ needs.image-sca-security.outputs.image-ref }}
      image-digest: ${{ steps.build_and_push.outputs.digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Checks out repository files so Docker can rebuild and publish the image.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Enables Docker Buildx for registry-backed builds and cache support.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Authenticates Docker to GHCR for image push operations.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates canonical and convenience tags plus OCI labels for the publish step.
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ env.REGISTRY }}/${{ needs.image-sca-security.outputs.image-name }}
          tags: |
            type=raw,value=${{ needs.image-sca-security.outputs.image-tag }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Rebuilds the container and pushes tags to GHCR using Docker's publish action.
      - name: Build and push Docker image
        id: build_and_push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}

      # Records the selected published image reference for downstream jobs and summaries.
      - name: Summarize published image
        shell: bash
        env:
          IMAGE_REF: ${{ needs.image-sca-security.outputs.image-ref }}
          IMAGE_DIGEST: ${{ steps.build_and_push.outputs.digest }}
        run: |
          echo "Published ${IMAGE_REF}"
          echo "Digest ${IMAGE_DIGEST}"
          {
            echo "## Published Image"
            echo ""
            echo "- Reference: ${IMAGE_REF}"
            echo "- Digest: ${IMAGE_DIGEST}"
          } >> "$GITHUB_STEP_SUMMARY"

  attest:
    name: Attest image provenance
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-sign
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      # Creates a provenance attestation for the published image digest.
      - name: Attest published image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ needs.image-sign.outputs.image-repository }}
          subject-digest: ${{ needs.image-sign.outputs.image-digest }}

  image-sign:
    name: Sign container image
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-publish
    runs-on: ubuntu-latest
    outputs:
      image-repository: ${{ steps.sign.outputs.image_repository }}
      image-digest: ${{ steps.sign.outputs.image_digest }}
      image-with-digest: ${{ steps.sign.outputs.image_with_digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      # Restores scan artifacts so the image SBOM can be attached.
      - name: Download image security artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-security-artifacts
          path: ghcr-evidence/image-security

      # Authenticates Docker to GHCR for attach and sign operations.
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Installs the Cosign CLI used for SBOM attach and signing.
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      # Attaches the generated SBOM file to the published image reference.
      - name: Attach image SBOM to published image
        shell: bash
        env:
          IMAGE_PUBLISH_REF: ${{ needs.image-publish.outputs.image-ref }}
          IMAGE_PUBLISH_DIGEST: ${{ needs.image-publish.outputs.image-digest }}
        run: |
          IMAGE_REPOSITORY="$IMAGE_PUBLISH_REF"
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY%:*}"
          IMAGE_DIGEST="$IMAGE_PUBLISH_DIGEST"
          IMAGE_WITH_DIGEST="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          IMAGE_SBOM_FILE="$(find ghcr-evidence/image-security -type f \( -name 'image.cdx.json' -o -name '*.cdx.json' \) | head -n 1)"

          if [[ -z "${IMAGE_SBOM_FILE}" ]]; then
            echo "::error::Image SBOM file not found for GHCR attachment."
            exit 1
          fi

          cosign attach sbom --sbom "${IMAGE_SBOM_FILE}" "${IMAGE_WITH_DIGEST}"

      # Signs the published image with GitHub-issued OIDC identity.
      - name: Sign published image with GitHub OIDC
        id: sign
        shell: bash
        env:
          IMAGE_PUBLISH_REF: ${{ needs.image-publish.outputs.image-ref }}
          IMAGE_PUBLISH_DIGEST: ${{ needs.image-publish.outputs.image-digest }}
        run: |
          IMAGE_REPOSITORY="$IMAGE_PUBLISH_REF"
          IMAGE_REPOSITORY="${IMAGE_REPOSITORY%:*}"
          IMAGE_DIGEST="$IMAGE_PUBLISH_DIGEST"
          IMAGE_WITH_DIGEST="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          cosign sign --yes "${IMAGE_WITH_DIGEST}"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image_with_digest=${IMAGE_WITH_DIGEST}" >> "$GITHUB_OUTPUT"

  verify-image-signature:
    name: Verify image signature
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_image) || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs:
      - image-sign
    outputs:
      image-with-digest: ${{ steps.verified_image.outputs.image_with_digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      # Authenticates Docker to GHCR so the signed image can be verified.
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Installs the Cosign CLI used for signature verification.
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      # Verifies the keyless signature against this workflow identity.
      - name: Verify keyless image signature
        id: verified_image
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          IMAGE_WITH_DIGEST: ${{ needs.image-sign.outputs.image-with-digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/$WORKFLOW_REF" \
            "$IMAGE_WITH_DIGEST"
          echo "image_with_digest=$IMAGE_WITH_DIGEST" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Azure Container Apps
    if: github.event_name == 'workflow_dispatch' && inputs.publish_image && inputs.deploy
    needs:
      - verify-image-signature
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      app-url: ${{ steps.resolve_app_url.outputs.app_url }}
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      # Validates required manual deployment inputs before touching Azure.
      - name: Validate deploy inputs
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          CONTAINER_APP_NAME: ${{ inputs.container_app_name }}
        run: |
          missing=()
          [[ -z "$DEPLOY_ENVIRONMENT" ]] && missing+=("environment")
          [[ -z "$RESOURCE_GROUP" ]] && missing+=("resource_group")
          [[ -z "$CONTAINER_APP_NAME" ]] && missing+=("container_app_name")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required deploy inputs: ${missing[*]}"
            exit 1
          fi

      # Checks out repository files used by deployment steps.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Authenticates Docker to GHCR for deployment-related image access.
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticates the workflow to Azure using OIDC.
      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Runs Azure CLI commands to update the Container App image.
      - name: Deploy container image
        uses: Azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        env:
          CONTAINER_APP_NAME: ${{ inputs.container_app_name }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          VERIFIED_IMAGE_WITH_DIGEST: ${{ needs.verify-image-signature.outputs.image-with-digest }}
        with:
          inlineScript: >-
            az containerapp update
            --name "$CONTAINER_APP_NAME"
            --resource-group "$RESOURCE_GROUP"
            --image "$VERIFIED_IMAGE_WITH_DIGEST"

      # Runs Azure CLI commands to resolve the staged app URL.
      - name: Resolve staged API URL
        id: resolve_app_url
        uses: Azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        env:
          STAGED_API_URL: ${{ inputs.staged_api_url }}
          CONTAINER_APP_NAME: ${{ inputs.container_app_name }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
        with:
          inlineScript: |
            if [[ -n "$STAGED_API_URL" ]]; then
              echo "app_url=$STAGED_API_URL" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            FQDN="$(az containerapp show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query properties.configuration.ingress.fqdn \
              -o tsv)"

            if [[ -z "${FQDN}" ]]; then
              echo "::error::Unable to resolve public Container App FQDN. Set staged_api_url input for ZAP baseline scan."
              exit 1
            fi

            echo "app_url=https://${FQDN}" >> "$GITHUB_OUTPUT"

  zap-baseline:
    name: ZAP baseline staged API scan
    if: github.event_name == 'workflow_dispatch' && inputs.publish_image && inputs.deploy
    needs:
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Runs OWASP ZAP baseline checks against the staged API URL.
      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ needs.deploy.outputs.app-url }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          cmd_options: -a
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-baseline-report

  record-and-notify:
    name: Record and notify
    if: always()
    runs-on: ubuntu-latest
    needs:
      - dotnet-build-test
      - dotnet-app-sca-security
      - image-sca-security
      - security-gate
      - image-publish
      - image-sign
      - verify-image-signature
      - deploy
      - zap-baseline
    permissions:
      contents: read
      issues: write
    steps:
      # Restores saved test reports into the final evidence bundle.
      - name: Download test results
        if: always() && needs.dotnet-build-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-results
          path: release-evidence/test-results

      # Restores saved app security outputs into the final evidence bundle.
      - name: Download app security artifacts
        if: always() && needs.dotnet-app-sca-security.result != 'skipped'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-security-artifacts
          path: release-evidence/app-security

      # Restores saved image security outputs into the final evidence bundle.
      - name: Download image security artifacts
        if: always() && needs.image-sca-security.result != 'skipped'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-security-artifacts
          path: release-evidence/image-security

      # Restores the gate report into the final evidence bundle.
      - name: Download security gate report
        if: always() && needs.security-gate.result != 'skipped'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: security-gate-report
          path: release-evidence/security-gate

      # Restores the ZAP report into the final evidence bundle.
      - name: Download ZAP report
        if: always() && needs.zap-baseline.result != 'skipped'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zap-baseline-report
          path: release-evidence/zap-baseline

      # Assembles machine-readable and human-readable release evidence files.
      - name: Create release evidence summary
        id: evidence
        shell: bash
        env:
          SECURITY_GATE_STATUS: ${{ needs.security-gate.outputs.gate-status || 'SKIPPED' }}
          BUILD_AND_TEST_RESULT: ${{ needs.dotnet-build-test.result }}
          APP_SECURITY_RESULT: ${{ needs.dotnet-app-sca-security.result }}
          IMAGE_SECURITY_RESULT: ${{ needs.image-sca-security.result }}
          IMAGE_PUBLISH_RESULT: ${{ needs.image-publish.result }}
          IMAGE_SIGN_RESULT: ${{ needs.image-sign.result }}
          VERIFY_IMAGE_SIGNATURE_RESULT: ${{ needs.verify-image-signature.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          ZAP_BASELINE_RESULT: ${{ needs.zap-baseline.result }}
          PUBLISHED_IMAGE_REF: ${{ needs.image-publish.outputs.image-ref }}
          PUBLISHED_IMAGE_DIGEST: ${{ needs.image-publish.outputs.image-digest }}
          VERIFIED_IMAGE_WITH_DIGEST: ${{ needs.verify-image-signature.outputs.image-with-digest }}
          STAGED_APP_URL: ${{ needs.deploy.outputs.app-url }}
        run: |
          mkdir -p release-evidence

          IMAGE_VERSION="${PUBLISHED_IMAGE_REF##*:}"
          if [[ -z "${PUBLISHED_IMAGE_REF}" || "${IMAGE_VERSION}" == "${PUBLISHED_IMAGE_REF}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              IMAGE_VERSION="${GITHUB_REF_NAME}"
            else
              IMAGE_VERSION="${GITHUB_SHA::7}"
            fi
          fi

          cat > release-evidence/build-metadata.json <<EOF
          {
            "build": {
              "name": "DevSecOpsPipelineSample",
              "number": "${GITHUB_RUN_NUMBER}",
              "version": "${IMAGE_VERSION}",
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "vcs": {
                "revision": "${GITHUB_SHA}",
                "branch": "${GITHUB_REF_NAME}",
                "url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
              }
            },
            "security": {
              "gate": {
                "status": "${SECURITY_GATE_STATUS}"
              },
              "stages": {
                "appSecurity": "${APP_SECURITY_RESULT}",
                "imageSecurity": "${IMAGE_SECURITY_RESULT}",
                "signatureVerification": "${VERIFY_IMAGE_SIGNATURE_RESULT}",
                "dast": "${ZAP_BASELINE_RESULT}"
              }
            },
            "artifacts": {
              "publishedImageRef": "${PUBLISHED_IMAGE_REF}",
              "publishedImageDigest": "${PUBLISHED_IMAGE_DIGEST}",
              "verifiedImageWithDigest": "${VERIFIED_IMAGE_WITH_DIGEST}",
              "releaseEvidenceArtifact": "release-evidence"
            },
            "deployment": {
              "result": "${DEPLOY_RESULT}",
              "stagedAppUrl": "${STAGED_APP_URL}"
            }
          }
          EOF

          cat > release-evidence/pipeline-summary.md <<EOF
          # DevSecOps Pipeline Summary

          - Security gate: ${SECURITY_GATE_STATUS}
          - Build and test: ${BUILD_AND_TEST_RESULT}
          - App security: ${APP_SECURITY_RESULT}
          - Image security: ${IMAGE_SECURITY_RESULT}
          - Image publish: ${IMAGE_PUBLISH_RESULT}
          - Image sign: ${IMAGE_SIGN_RESULT}
          - Signature verify: ${VERIFY_IMAGE_SIGNATURE_RESULT}
          - Deploy: ${DEPLOY_RESULT}
          - ZAP baseline: ${ZAP_BASELINE_RESULT}
          - Published image ref: ${PUBLISHED_IMAGE_REF}
          - Published image digest: ${PUBLISHED_IMAGE_DIGEST}
          - Verified image digest ref: ${VERIFIED_IMAGE_WITH_DIGEST}
          - Image SBOM attached to GHCR: yes
          - Staged app URL: ${STAGED_APP_URL}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          cat > release-evidence/pipeline-summary.json <<EOF
          {
            "securityGate": "${SECURITY_GATE_STATUS}",
            "buildAndTest": "${BUILD_AND_TEST_RESULT}",
            "appSecurity": "${APP_SECURITY_RESULT}",
            "imageSecurity": "${IMAGE_SECURITY_RESULT}",
            "imagePublish": "${IMAGE_PUBLISH_RESULT}",
            "imageSign": "${IMAGE_SIGN_RESULT}",
            "verifyImageSignature": "${VERIFY_IMAGE_SIGNATURE_RESULT}",
            "deploy": "${DEPLOY_RESULT}",
            "zapBaseline": "${ZAP_BASELINE_RESULT}",
            "publishedImageRef": "${PUBLISHED_IMAGE_REF}",
            "publishedImageDigest": "${PUBLISHED_IMAGE_DIGEST}",
            "verifiedImageWithDigest": "${VERIFIED_IMAGE_WITH_DIGEST}",
            "stagedAppUrl": "${STAGED_APP_URL}",
            "commit": "${GITHUB_SHA}",
            "runUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF

          cat release-evidence/pipeline-summary.md >> "$GITHUB_STEP_SUMMARY"

      # Publishes the assembled release evidence as one downloadable artifact.
      - name: Upload release evidence bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence
          path: release-evidence/**

      - name: Comment on pull request
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api \
            "repos/$REPOSITORY/issues/$PULL_REQUEST_NUMBER/comments" \
            -f body="$(cat release-evidence/pipeline-summary.md)"
